<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선유듀오</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.1/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root {
            --bg: #F0EDEA;
            --card: #ffffff;
            --accent: #FF5252;
            --accent-light: #FFB0B0;
            --text: #222222;
            --text-light: #999999;
            --border: #F0F0F0;
            --green: #5a9e6f;
            --red: #FF5252;
            --blue: #5B7FFF;
            --peach: #FFF0EE;
            /* domino-style asset palette */
            --dm-bg: #F0EDEA;
            --dm-card: #ffffff;
            --dm-text: #222222;
            --dm-text2: #999999;
            --dm-divider: #F0F0F0;
            --dm-indigo: #3D3A6E;
            --dm-blue: #5B7FFF;
            --dm-soft: #8FA8FF;
            --dm-peri: #C0CCFF;
            --dm-light: #D8DFFF;
            --dm-pale: #E8ECFF;
            --dm-coral: #FF5252;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Wanted Sans Variable', 'Wanted Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Password Overlay ── */
        .pw-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #F5F3F0 0%, #EDEAE6 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .pw-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 360px;
            width: 90%;
        }
        .pw-box h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--accent);
        }
        .pw-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .pw-box input:focus { border-color: var(--accent); }
        .pw-box button {
            margin-top: 12px;
            padding: 10px 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .pw-box button:hover { background: #E84545; }
        .pw-error {
            color: var(--red);
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
        .pw-hidden { display: none; }

        /* ── Header ── */
        header {
            background: #fff;
            padding: 24px;
            text-align: center;
            color: var(--text);
            position: relative;
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #222;
        }
        header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        header a:hover { opacity: 0.7; }

        /* ── Tab Navigation ── */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 0;
            background: #fff;
            border-bottom: 1px solid #EEEEEE;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab-btn {
            padding: 14px 24px;
            border: none;
            background: none;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* ── Content ── */
        .content { padding: 24px; max-width: 1000px; margin: 0 auto; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: none;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Tables ── */
        .memo-tip-text {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: #fff;
            font-size: 0.78rem;
            padding: 8px 12px;
            border-radius: 8px;
            white-space: normal;
            width: max-content;
            max-width: 220px;
            z-index: 10;
            line-height: 1.4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .memo-tip:hover .memo-tip-text,
        .memo-tip.show-tip .memo-tip-text { display: block; }
        .goal-card {
            flex: 1;
            min-width: 260px;
            background: var(--dm-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .goal-card .goal-owner {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--dm-text);
            margin-bottom: 14px;
        }
        .goal-card .goal-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--dm-text2);
            margin-bottom: 6px;
            margin-top: 12px;
        }
        .goal-card .goal-section-title:first-of-type { margin-top: 0; }
        .goal-card .goal-item {
            font-size: 0.82rem;
            color: var(--dm-text);
            padding: 6px 0;
            border-bottom: 1px solid var(--dm-divider);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .goal-card .goal-item:last-child { border-bottom: none; }
        .goal-badge {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .goal-badge.duo { background: #222; color: #fff; }
        .goal-badge.ts { background: var(--dm-coral); color: #fff; }
        .goal-badge.ny { background: var(--dm-blue); color: #fff; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .data-table th {
            padding: 10px 12px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            color: #CC4040;
            border-bottom: 2px solid #FFD6D6;
            background: #FFF0EE;
            white-space: nowrap;
        }
        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .data-table tbody tr:hover td { background: #FAFAFA; }
        .data-table .num { text-align: right; }
        .data-table .center { text-align: center; }
        .positive { color: var(--red); }
        .negative { color: var(--blue); }

        /* ── Balance Sheet (Domino style) ── */
        .bs-net {
            text-align: center;
            background: var(--dm-card);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .bs-net .label { font-size: 0.78rem; color: #222; margin-bottom: 6px; font-weight: 700; }
        .bs-net .value { font-size: 1.6rem; font-weight: 800; color: var(--dm-text); }
        .bs-wrap {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .bs-side {
            flex: 1;
            background: var(--dm-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: none;
        }
        .bs-side.asset { border-left: none; }
        .bs-side.debt  { border-left: none; }
        .bs-title {
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 8px;
        }
        .bs-side.asset .bs-title { background: var(--dm-coral); color: #fff; }
        .bs-side.debt  .bs-title { background: var(--dm-blue); color: #fff; }
        .bs-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.88rem;
        }
        .bs-row .label { color: var(--dm-text); }
        .bs-row .amt { font-weight: 600; color: var(--dm-text); }
        .bs-total {
            display: flex;
            justify-content: space-between;
            padding: 10px 0 0;
            margin-top: 8px;
            border-top: 1px solid var(--dm-divider);
            font-weight: 700;
            font-size: 1rem;
        }
        .bs-side.asset .bs-total { color: #222; }
        .bs-side.debt  .bs-total { color: #222; }

        .bs-group {
            border: 1.5px solid #222;
            border-radius: 12px;
            padding: 12px 14px 8px;
            margin-bottom: 10px;
        }
        .bs-group:last-of-type { margin-bottom: 0; }
        .bs-group-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--dm-text2);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .bs-wrap { flex-direction: column; }
        }


        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-light);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-state .msg { font-size: 0.95rem; }
        .empty-state .hint {
            font-size: 0.82rem;
            margin-top: 8px;
            color: #b0a89e;
        }

        /* ── Loading ── */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #EEEEEE;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Config Banner ── */
        .config-banner {
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #e65100;
            line-height: 1.6;
        }
        .config-banner code {
            background: #fff;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.82rem;
        }

        /* ── Calendar ── */
        .cal-month-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .cal-month-nav button {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: #fff;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
        }
        .cal-month-nav button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .cal-month-label { font-size: 1.05rem; font-weight: 700; min-width: 110px; text-align: center; }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 20px;
        }
        .cal-dow {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-light);
            padding: 6px 0;
        }
        .cal-dow.sun { color: var(--red); }
        .cal-dow.sat { color: var(--blue); }
        .cal-cell {
            background: #fff;
            border-radius: 8px;
            padding: 5px;
            min-height: 72px;
            border: 1px solid var(--border);
            cursor: default;
            overflow-y: auto;
        }
        .cal-cell.empty { background: transparent; border: none; }
        .cal-cell.today { border-color: var(--accent); border-width: 2px; }
        .cal-cell.sun .cal-d { color: var(--red); }
        .cal-cell.sat .cal-d { color: var(--blue); }
        .cal-d { font-size: 0.72rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
        .cal-ev {
            font-size: 0.6rem;
            line-height: 1.35;
            padding: 1px 4px;
            border-radius: 3px;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: var(--peach);
            color: var(--accent);
            font-weight: 600;
        }

        .evt-table { width: 100%; border-collapse: collapse; }
        .evt-table th {
            background: #FAFAFA;
            padding: 10px 12px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-light);
            border-bottom: 2px solid var(--border);
        }
        .evt-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .evt-table tr:hover td { background: #FAFAFA; }
        .evt-date-badge {
            display: inline-block;
            background: var(--peach);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.78rem;
            padding: 2px 8px;
            border-radius: 6px;
        }
        .evt-time { color: var(--text-light); font-size: 0.8rem; }
        .evt-empty { text-align: center; padding: 40px; color: var(--text-light); }

        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .tab-btn { padding: 12px 14px; font-size: 0.85rem; }
            .content { padding: 16px; }
        }
    </style>
</head>
<body>

<!-- Password Overlay -->
<div id="pwOverlay" class="pw-overlay">
    <div class="pw-box">
        <h2>선유듀오</h2>
        <p style="color:#8a7e76;margin-bottom:20px;font-size:0.9rem">비밀번호를 입력하세요</p>
        <input type="password" id="pwInput" placeholder="비밀번호" autofocus
               onkeydown="if(event.key==='Enter')checkPw()">
        <button onclick="checkPw()">확인</button>
        <div id="pwError" class="pw-error">비밀번호가 틀렸습니다.</div>
    </div>
</div>

<!-- Main Content -->
<div id="mainContent" class="pw-hidden">

<header>
    <h1>선유듀오</h1>
    <div style="position:absolute;top:14px;right:20px;text-align:right">
        <a href="https://docs.google.com/spreadsheets/d/1w6q3UwUER7oINuk50LyMzgF2K0Fbt2wgSVJ34vImo0g/edit" target="_blank">스프레드시트 &#8599;</a>
        <div id="lastUpdated" style="font-size:0.7rem;color:#999;margin-top:4px"></div>
    </div>
</header>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('assets')">자산관리</button>
    <button class="tab-btn" onclick="switchTab('calendar')">캘린더</button>
    <button class="tab-btn" onclick="switchTab('meeting')">가족회의</button>
</div>

<div class="content">

    <!-- ====== 자산관리 ====== -->
    <div id="tab-assets" class="tab-content active">
        <div id="assets-summary"></div>
        <div id="assets-charts" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
            <div style="flex:1;min-width:280px;display:flex;flex-direction:column;gap:12px">
                <div style="background:var(--dm-card);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                    <div style="font-size:0.82rem;font-weight:700;color:var(--dm-text);margin-bottom:12px">순자산 추이</div>
                    <canvas id="chartLine"></canvas>
                </div>
                <div style="background:var(--dm-card);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                    <div style="font-size:0.82rem;font-weight:700;color:var(--dm-text);margin-bottom:12px">월별 증감</div>
                    <canvas id="chartBar"></canvas>
                </div>
            </div>
            <div style="flex:1;min-width:280px;background:var(--dm-card);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                    <div style="display:flex;align-items:center;gap:8px">
                        <span style="font-size:0.82rem;font-weight:700;color:var(--dm-text)">자산 구성</span>
                        <select id="pieOwnerFilter" onchange="filterPieChart()" style="font-size:0.75rem;padding:2px 6px;border:1px solid #ddd;border-radius:6px;color:var(--dm-text);background:#fff;cursor:pointer">
                            <option value="all">Duo</option>
                            <option value="TS">TS</option>
                            <option value="NY">NY</option>
                        </select>
                    </div>
                </div>
                <canvas id="chartPie"></canvas>
            </div>
        </div>
        <div id="assets-balance-sheet"></div>
        <div class="card">
            <div class="card-title">자산 현황</div>
            <div id="assets-table"><div class="loading">데이터 로딩 중</div></div>
        </div>
    </div>

    <!-- ====== 캘린더 ====== -->
    <div id="tab-calendar" class="tab-content">
        <div class="cal-month-nav">
            <button onclick="calPrevMonth()">&#9664;</button>
            <span class="cal-month-label" id="calMonthLabel"></span>
            <button onclick="calNextMonth()">&#9654;</button>
        </div>
        <div class="card" style="padding:16px;">
            <div class="cal-grid" id="calGrid"></div>
        </div>
        <div class="card">
            <div class="card-title">일정 목록</div>
            <div id="calEventList"></div>
        </div>
    </div>

    <!-- ====== 가족회의 ====== -->
    <div id="tab-meeting" class="tab-content">
        <div id="goals-section" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap"></div>
        <div class="card">
            <div class="card-title">가족회의 기록</div>
            <div id="meeting-table"><div class="loading">데이터 로딩 중</div></div>
        </div>
    </div>

</div>

<footer>
    선유듀오 &copy; 2026
</footer>

</div>

<script>
// ── Password ──
const PW_HASH = '7d78e91672fb21bfd70f2c3a5df40ee3d3cf052ae66a133df53822cc8bad44ee';

async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPw() {
    const hash = await sha256(document.getElementById('pwInput').value);
    if (hash === PW_HASH) {
        document.getElementById('pwOverlay').style.display = 'none';
        document.getElementById('mainContent').classList.remove('pw-hidden');
        sessionStorage.setItem('seonyu_auth', '1');
        loadAllData();
    } else {
        document.getElementById('pwError').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
    }
}

if (sessionStorage.getItem('seonyu_auth') === '1') {
    document.getElementById('pwOverlay').style.display = 'none';
    document.getElementById('mainContent').classList.remove('pw-hidden');
    window.addEventListener('DOMContentLoaded', loadAllData);
}

// ── Tab Switching ──
function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
}

// ── Google Sheets Config ──
// 아래 SHEET_ID를 본인 Google Sheet ID로 교체하세요.
// Google Sheet → 파일 → 공유 → 웹에 게시 → 게시 후 사용
const SHEET_ID = '1w6q3UwUER7oINuk50LyMzgF2K0Fbt2wgSVJ34vImo0g';

const SHEET_NAMES = {
    assets: '자산관리',
    meeting: '가족회의',
    goals: '목표'
};

const GOOGLE_API_KEY = 'AIzaSyCHPiRby5FVAIKDwneZHy1KGl3SfycjZEw';

function sheetUrl(sheetName) {
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
}

function parseGviz(text) {
    // Google Visualization API returns "google.visualization.Query.setResponse({...})"
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\((.+)\)/s)[1]);
    const cols = json.table.cols.map(c => c.label);
    const rows = json.table.rows.map(r =>
        r.c.map(cell => cell ? (cell.v !== null ? cell.v : (cell.f || '')) : '')
    );
    return { cols, rows };
}

async function fetchSheet(sheetName) {
    const resp = await fetch(sheetUrl(sheetName));
    const text = await resp.text();
    return parseGviz(text);
}

// ── Alignment Fetching (Sheets API v4) ──
async function fetchAlignments() {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?` +
        `ranges=${encodeURIComponent(SHEET_NAMES.assets)}` +
        `&ranges=${encodeURIComponent(SHEET_NAMES.meeting)}` +
        `&fields=sheets(properties.title,data.rowData.values.effectiveFormat.horizontalAlignment)` +
        `&key=${GOOGLE_API_KEY}`;
    const resp = await fetch(url);
    if (!resp.ok) return {};
    const json = await resp.json();
    const result = {};
    (json.sheets || []).forEach(sheet => {
        const title = sheet.properties.title;
        const rows = (sheet.data && sheet.data[0] && sheet.data[0].rowData) || [];
        // Use header row (1st row) alignment
        const refRow = rows[0];
        const aligns = (refRow?.values || []).map(v => {
            const a = v?.effectiveFormat?.horizontalAlignment;
            if (a === 'CENTER') return 'center';
            if (a === 'RIGHT') return 'right';
            return 'left';
        });
        if (title === SHEET_NAMES.assets) result.assets = aligns;
        else if (title === SHEET_NAMES.meeting) result.meeting = aligns;
    });
    return result;
}

// ── 셀 값 포맷 (컬럼명 기반 자동 판별) ──
function formatCell(val, colName) {
    const cn = (colName || '').trim();
    if (cn === '날짜') return formatDateStr(val);
    if (cn === '요일') return formatDayStr(val);
    if (cn === '금액') return formatMoney(val);
    if (cn === '결정사항') {
        const s = String(val ?? '').trim();
        if (!s) return '';
        const escaped = s.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        return `<span class="memo-tip" style="cursor:pointer;font-size:0.95rem;position:relative" onclick="this.classList.toggle('show-tip')">📄<span class="memo-tip-text">${s}</span></span>`;
    }
    if (cn.includes('완료')) {
        const v = String(val ?? '').toUpperCase().trim();
        const checked = (val === true || v === 'TRUE');
        return `<input type="checkbox"${checked ? ' checked' : ''} disabled style="pointer-events:none;width:16px;height:16px;accent-color:var(--dm-coral)">`;
    }
    return String(val ?? '');
}

// ── 동적 테이블 렌더링 (컬럼 자동 감지) ──
function renderSheet(cols, rows, aligns) {
    // 빈 컬럼 제거 (라벨이 비어있는 뒤쪽 컬럼)
    let colCount = cols.length;
    while (colCount > 0 && !cols[colCount - 1]) colCount--;
    const headers = cols.slice(0, colCount);

    const sorted = rows;
    let html = '<table class="data-table"><thead><tr>';
    headers.forEach((h, i) => {
        html += `<th style="text-align:${aligns[i] || 'center'}">${h}</th>`;
    });
    html += '</tr></thead><tbody>';
    sorted.forEach(r => {
        html += '<tr>';
        headers.forEach((h, i) => {
            const ws = ['내용','결정사항','메모'].includes(h) ? 'white-space:normal;max-width:250px;' : '';
            const bodyAlign = (h === '내용') ? 'left' : (aligns[i] || 'center');
            html += `<td style="${ws}text-align:${bodyAlign}">${formatCell(r[i], h)}</td>`;
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
}

function renderPieChart(allAssets) {
    const ctx = document.getElementById('chartPie');
    if (!ctx || allAssets.length === 0) return;
    if (pieChartInstance) pieChartInstance.destroy();

    // 자산명 기준 그룹핑
    const grouped = {};
    allAssets.forEach(x => {
        const key = x.name || x.display;
        if (!grouped[key]) grouped[key] = { name: key, amt: 0, details: [] };
        grouped[key].amt += x.amt;
        grouped[key].details.push(x.display);
    });
    const sorted = Object.values(grouped).sort((a, b) => b.amt - a.amt);
    const total = sorted.reduce((s, x) => s + x.amt, 0);
    const labels = sorted.map(x => x.name);
    const data = sorted.map(x => x.amt);
    const details = sorted.map(x => x.details);
    const colors = sorted.map((_, i) => PIE_COLORS[i % PIE_COLORS.length]);

    pieChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: colors,
                borderColor: '#fff',
                borderWidth: 2
            }]
        },
        plugins: [ChartDataLabels],
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        font: { size: 11 },
                        color: '#222',
                        padding: 12,
                        usePointStyle: true,
                        pointStyle: 'circle'
                    }
                },
                tooltip: {
                    callbacks: {
                        label: (tip) => {
                            const v = tip.parsed;
                            const pct = total > 0 ? ((v / total) * 100).toFixed(1) : 0;
                            const lines = [` ${tip.label}: ${v.toLocaleString()} (${pct}%)`];
                            const d = details[tip.dataIndex];
                            if (d && d.length > 0) d.forEach(x => lines.push(`  · ${x}`));
                            return lines;
                        }
                    }
                },
                datalabels: {
                    color: '#fff',
                    font: { size: 11, weight: 'bold' },
                    textAlign: 'center',
                    formatter: (v, ctx) => {
                        const pct = total > 0 ? ((v / total) * 100).toFixed(1) : 0;
                        if (pct < 5) return '';
                        const name = ctx.chart.data.labels[ctx.dataIndex];
                        return name + '\n' + pct + '%';
                    }
                }
            }
        }
    });
}

// ── 행을 자산/비상장/부채로 분류하는 헬퍼 ──
function classifyRows(rowSet, cols) {
    const amtIdx = cols.indexOf('금액');
    const typeIdx = cols.indexOf('구분');
    const nameIdx = cols.indexOf('자산명');
    const memoIdx = cols.indexOf('메모');
    const ownerIdx = cols.indexOf('담당자');
    const listed = [], unlisted = [], debts = [];
    rowSet.forEach(r => {
        const amt = Number(r[amtIdx]) || 0;
        const type = typeIdx !== -1 ? (r[typeIdx] || '') : '';
        const name = nameIdx !== -1 ? (r[nameIdx] || '') : '';
        const memo = memoIdx !== -1 ? (r[memoIdx] || '') : '';
        const owner = ownerIdx !== -1 ? (r[ownerIdx] || '') : '';
        const nameMemo = memo ? `${name} - ${memo}` : name;
        const display = owner ? `${owner} | ${nameMemo}` : nameMemo;
        if (type === '대출') debts.push({ display, nameMemo, amt, owner, name });
        else if (name.includes('비상장')) unlisted.push({ display, nameMemo, amt, owner, name });
        else listed.push({ display, nameMemo, amt, owner, name });
    });
    return { listed, unlisted, debts };
}

function calcNetWorth(classified) {
    const { listed, unlisted, debts } = classified;
    const totalListed = listed.reduce((s, x) => s + x.amt, 0);
    const totalUnlisted = unlisted.reduce((s, x) => s + x.amt, 0);
    const totalDebt = debts.reduce((s, x) => s + x.amt, 0);
    return { netWorth: totalListed - totalDebt, totalListed, totalUnlisted, totalAsset: totalListed + totalUnlisted, totalDebt };
}

// ── 대차대조표 렌더링 ──
function renderBalanceSheet(listed, unlisted, debts, filter) {
    const fListed = filter === 'all' ? listed : listed.filter(x => x.owner === filter);
    const fUnlisted = filter === 'all' ? unlisted : unlisted.filter(x => x.owner === filter);
    const fDebts = filter === 'all' ? debts : debts.filter(x => x.owner === filter);

    const totalListed = fListed.reduce((s, x) => s + x.amt, 0);
    const totalUnlisted = fUnlisted.reduce((s, x) => s + x.amt, 0);
    const totalAsset = totalListed + totalUnlisted;
    const totalDebt = fDebts.reduce((s, x) => s + x.amt, 0);
    const netWorth = totalListed - totalDebt;

    function renderOwnerGroups(items, unlistedItems) {
        const owners = [...new Set(items.map(x => x.owner).filter(Boolean))];
        if (owners.length === 0 && items.length > 0) owners.push('');
        let html = '';
        owners.forEach(ow => {
            const owItems = items.filter(x => x.owner === ow);
            const owUnlisted = (unlistedItems || []).filter(x => x.owner === ow);
            if (owItems.length === 0 && owUnlisted.length === 0) return;
            // 필터가 특정 소유자면 그룹 박스 없이 바로 표시
            const showGroup = (filter === 'all');
            if (showGroup) html += `<div class="bs-group">`;
            if (showGroup && ow) html += `<div class="bs-group-title">${ow}</div>`;
            owItems.forEach(x => {
                html += `<div class="bs-row"><span class="label">${x.nameMemo}</span><span class="amt">${formatMoney(x.amt)}</span></div>`;
            });
            if (owUnlisted.length > 0) {
                html += `<div style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--dm-peri);font-size:0.72rem;color:var(--dm-text2);font-weight:600;margin-bottom:4px">비상장 투자</div>`;
                owUnlisted.forEach(x => {
                    html += `<div class="bs-row" style="opacity:0.7"><span class="label">${x.nameMemo}</span><span class="amt">${formatMoney(x.amt)}</span></div>`;
                });
            }
            if (showGroup) html += `</div>`;
        });
        return html;
    }

    const leftRows = renderOwnerGroups(fListed, fUnlisted);
    const rightRows = renderOwnerGroups(fDebts);
    const alphaHtml = totalUnlisted > 0 ? `<span style="font-size:0.85rem;color:var(--dm-text2);margin-left:10px">(+${formatMoney(totalUnlisted)})</span>` : '';
    const filterLabel = filter === 'all' ? 'Duo' : filter;

    const netHtml = `
        <div class="bs-net" style="position:relative">
            <span id="netDateLabel" style="position:absolute;top:14px;right:18px;font-size:0.72rem;color:var(--dm-text2)"></span>
            <div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:8px">
                <span class="label" style="margin:0">순자산</span>
            </div>
            <div class="value">${formatMoney(netWorth)}${alphaHtml}</div>
        </div>`;
    const bsHtml = `
        <div class="bs-wrap">
            <div class="bs-side asset">
                <div class="bs-title" style="display:flex;justify-content:space-between;align-items:center">
                    <span>자산</span>
                    <select id="bsOwnerFilter" onchange="filterBalanceSheet()" style="font-size:0.72rem;padding:2px 6px;border:1px solid #ddd;border-radius:6px;color:#222;background:#fff;cursor:pointer">
                        <option value="all"${filter==='all'?' selected':''} style="color:#222">Duo</option>
                        <option value="TS"${filter==='TS'?' selected':''} style="color:#222">TS</option>
                        <option value="NY"${filter==='NY'?' selected':''} style="color:#222">NY</option>
                    </select>
                </div>
                ${leftRows}
                <div class="bs-total"><span>합계</span><span>${formatMoney(totalAsset)}</span></div>
            </div>
            <div class="bs-side debt">
                <div class="bs-title">부채</div>
                ${rightRows || '<div class="bs-row" style="color:var(--text-light)">없음</div>'}
                <div class="bs-total"><span>합계</span><span>${formatMoney(totalDebt)}</span></div>
            </div>
        </div>`;
    document.getElementById('assets-summary').innerHTML = netHtml;
    document.getElementById('assets-balance-sheet').innerHTML = bsHtml;
}

// ── 자산관리 ──
async function loadAssets(aligns) {
    try {
        const { cols, rows } = await fetchSheet(SHEET_NAMES.assets);
        if (rows.length === 0) {
            document.getElementById('assets-table').innerHTML = emptyState('자산 데이터가 없습니다', '자산 시트에 데이터를 입력하세요');
            return;
        }

        const amtIdx = cols.indexOf('금액');
        if (amtIdx === -1) { document.getElementById('assets-table').innerHTML = renderSheet(cols, rows, aligns); return; }

        // 월별 그룹핑
        const dateIdx = cols.indexOf('날짜');
        const monthMap = {};  // 'YYYY-MM' → [rows]
        rows.forEach(r => {
            const d = parseDate(r[dateIdx]);
            const key = d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` : 'unknown';
            if (!monthMap[key]) monthMap[key] = [];
            monthMap[key].push(r);
        });
        const monthKeys = Object.keys(monthMap).filter(k => k !== 'unknown').sort();
        const latestMonth = monthKeys[monthKeys.length - 1];
        const latestRows = monthMap[latestMonth] || rows;

        // 최신 월 기준 데이터로 대차대조표/파이차트
        const latest = classifyRows(latestRows, cols);
        const { netWorth, totalListed, totalUnlisted, totalAsset, totalDebt } = calcNetWorth(latest);
        const { listed, unlisted, debts } = latest;

        // 순자산 추이 (월별)
        const lineData = new Array(11).fill(null);  // 2월~12월
        monthKeys.forEach(key => {
            const m = parseInt(key.split('-')[1]);
            if (m >= 2 && m <= 12) {
                const c = classifyRows(monthMap[key], cols);
                const nw = calcNetWorth(c);
                lineData[m - 2] = nw.netWorth;
            }
        });

        // 기준 월 표시
        const latestY = parseInt(latestMonth.split('-')[0]) % 100;
        const latestM = parseInt(latestMonth.split('-')[1]);
        latestDateStr = `${latestY}년 ${latestM}월`;

        const ownerSort = (a, b) => {
            if (a.owner !== b.owner) return a.owner === 'TS' ? -1 : 1;
            return b.amt - a.amt;
        };
        listed.sort(ownerSort);
        unlisted.sort(ownerSort);
        debts.sort(ownerSort);

        bsData = { listed, unlisted, debts };
        renderBalanceSheet(listed, unlisted, debts, 'all');
        const netDateEl = document.getElementById('netDateLabel');
        if (netDateEl) netDateEl.textContent = latestDateStr;

        // 차트 렌더링
        pieAllAssets = [...listed, ...unlisted];
        renderLineChart(lineData);
        renderBarChart(lineData);
        document.getElementById('pieOwnerFilter').value = 'all';
        renderPieChart(pieAllAssets);

        document.getElementById('assets-table').innerHTML = renderSheet(cols, rows, aligns);
    } catch (e) {
        document.getElementById('assets-table').innerHTML = errorState('자산 데이터를 불러올 수 없습니다');
    }
}

        const ownerIdx = cols.indexOf('담당자');
        const goalIdx = cols.indexOf('목표');
        const periodIdx = cols.indexOf('기간');

        const yearly = [];
        const monthly = [];
        rows.forEach(r => {
            const owner = String(r[ownerIdx] || '').trim();
            const goal = String(r[goalIdx] || '').trim();
            const period = String(r[periodIdx] || '').trim();
            if (!owner || !goal) return;
            if (period.includes('년')) {
                yearly.push({ owner, goal, period });
            } else {
                monthly.push({ owner, goal, period });
            }
        });

        // 연간 목표 카드
        function renderYearlyCard(items) {
            if (items.length === 0) return '';
            const yearLabel = items[0]?.period || '';
            let html = `<div class="goal-card"><div class="goal-owner" style="display:flex;justify-content:space-between;align-items:center">연간 목표<span style="font-size:0.75rem;font-weight:600;color:var(--dm-text2)">${yearLabel}</span></div>`;
            ['Duo', 'TS', 'NY'].forEach(owner => {
                const ownerItems = items.filter(x => x.owner === owner);
                ownerItems.forEach(g => {
                    html += `<div class="goal-item"><span class="goal-badge ${owner.toLowerCase()}">${owner}</span><span>${g.goal}</span></div>`;
                });
            });
            html += `</div>`;
            return html;
        }

        // 월간 목표 카드: 월별 → 담당자별
        function renderMonthlyCard(items) {
            if (items.length === 0) return '';
            // 월 순서 정렬
            const monthOrder = m => {
                const n = parseInt(m);
                return isNaN(n) ? 99 : n;
            };
            const months = [...new Set(items.map(x => x.period))].sort((a, b) => monthOrder(a) - monthOrder(b));
            let html = `<div class="goal-card"><div class="goal-owner">월간 목표</div>`;
            months.forEach(month => {
                html += `<div class="goal-section-title">${month}</div>`;
                ['Duo', 'TS', 'NY'].forEach(owner => {
                    const ownerItems = items.filter(x => x.period === month && x.owner === owner);
                    ownerItems.forEach(g => {
                        html += `<div class="goal-item"><span class="goal-badge ${g.owner.toLowerCase()}">${g.owner}</span><span>${g.goal}</span></div>`;
                    });
                });
            });
            html += `</div>`;
            return html;
        }

        const html = renderYearlyCard(yearly) + renderMonthlyCard(monthly);
        document.getElementById('goals-section').innerHTML = html;
    } catch (e) {
        document.getElementById('goals-section').innerHTML = '';
    }
}

// ── Utilities ──
function formatMoney(val) {
    const n = Number(val) || 0;
    return n.toLocaleString();
}

function parseDate(val) {
    if (!val) return null;
    if (typeof val === 'string' && val.startsWith('Date(')) {
        const parts = val.match(/Date\((\d+),(\d+),(\d+)\)/);
        if (parts) return new Date(+parts[1], +parts[2], +parts[3]);
    }
    const d = new Date(val);
    return isNaN(d) ? null : d;
}

function formatDateStr(val) {
    const d = parseDate(val);
    if (!d) return String(val || '');
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDayStr(val) {
    const days = ['일','월','화','수','목','금','토'];
    if (typeof val === 'string' && days.includes(val)) return val;
    const d = parseDate(val);
    if (d) return days[d.getDay()];
    return String(val || '');
}

function emptyState(msg, hint) {
    return `<div class="empty-state"><div class="icon">📭</div><div class="msg">${msg}</div><div class="hint">${hint || ''}</div></div>`;
}

function errorState(msg) {
    return `<div class="empty-state"><div class="icon">⚠️</div><div class="msg">${msg}</div><div class="hint">Google Sheets 연결 상태를 확인하세요</div></div>`;
}

// ── 캘린더 ──
const CAL_IDS = [
    'a49c912f9e11c6e050c873312ae00a314e45dc075540c86cf428c9921fcbc20c@group.calendar.google.com',
    'ea6tlekqo2hrf8oovaj5l1alblqhv41l@import.calendar.google.com'
];
let calYear, calMonth, calEvents = [];

function initCalState() {
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    calYear = now.getFullYear();
    calMonth = now.getMonth() + 1;
}
initCalState();

function calPrevMonth() { calMonth--; if (calMonth < 1) { calMonth = 12; calYear--; } loadCalendar(); }
function calNextMonth() { calMonth++; if (calMonth > 12) { calMonth = 1; calYear++; } loadCalendar(); }

async function loadCalendar() {
    document.getElementById('calMonthLabel').textContent = `${calYear}년 ${calMonth}월`;

    const from = new Date(calYear, calMonth - 1, 1);
    const nextM = calMonth === 12 ? 1 : calMonth + 1;
    const nextY = calMonth === 12 ? calYear + 1 : calYear;
    const to = new Date(nextY, nextM, 0, 23, 59, 59);

    try {
        const fetches = CAL_IDS.map(async calId => {
            const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?key=${GOOGLE_API_KEY}&timeMin=${from.toISOString()}&timeMax=${to.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=200`;
            const res = await fetch(url);
            if (!res.ok) return [];
            const data = await res.json();
            return (data.items || []);
        });
        const results = await Promise.all(fetches);
        calEvents = results.flat().map(ev => {
            const allDay = !!ev.start.date;
            const start = allDay ? ev.start.date : ev.start.dateTime;
            const end = allDay ? ev.end.date : ev.end.dateTime;
            return { summary: ev.summary || '(제목 없음)', date: start.slice(0, 10), startTime: allDay ? null : start.slice(11, 16), endTime: allDay ? null : end.slice(11, 16), allDay };
        }).sort((a, b) => (a.date + (a.startTime || '')) .localeCompare(b.date + (b.startTime || '')));
    } catch (e) {
        calEvents = [];
        document.getElementById('calEventList').innerHTML = '<div class="evt-empty">캘린더를 불러올 수 없습니다.<br><span style="font-size:0.78rem">캘린더가 공개 설정되어 있는지 확인하세요.</span></div>';
    }
    renderCalGrid();
    renderCalEventList();
}

function renderCalGrid() {
    const y = calYear, m = calMonth;
    const firstDay = new Date(y, m - 1, 1).getDay();
    const daysInMonth = new Date(y, m, 0).getDate();
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    const isThisMonth = now.getFullYear() === y && now.getMonth() + 1 === m;

    const dayNames = ['일','월','화','수','목','금','토'];
    let html = dayNames.map((d, i) => `<div class="cal-dow${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');

    const evByDay = {};
    calEvents.forEach(ev => {
        const [ey, em, ed] = ev.date.split('-').map(Number);
        if (ey === y && em === m) { if (!evByDay[ed]) evByDay[ed] = []; evByDay[ed].push(ev); }
    });

    for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
        const dow = (firstDay + d - 1) % 7;
        const isToday = isThisMonth && now.getDate() === d;
        let cls = 'cal-cell' + (dow===0?' sun':'') + (dow===6?' sat':'') + (isToday?' today':'');
        let evHtml = '';
        if (evByDay[d]) {
            evByDay[d].forEach(ev => { evHtml += `<div class="cal-ev">${ev.allDay ? '' : ev.startTime+' '}${ev.summary}</div>`; });
        }
        html += `<div class="${cls}"><div class="cal-d">${d}</div>${evHtml}</div>`;
    }
    document.getElementById('calGrid').innerHTML = html;
}

function renderCalEventList() {
    const nextM = calMonth === 12 ? 1 : calMonth + 1;
    const nextY = calMonth === 12 ? calYear + 1 : calYear;
    const filtered = calEvents.filter(ev => {
        const [ey, em] = ev.date.split('-').map(Number);
        return (ey === calYear && em === calMonth) || (ey === nextY && em === nextM);
    });

    if (filtered.length === 0) {
        document.getElementById('calEventList').innerHTML = '<div class="evt-empty">등록된 일정이 없습니다</div>';
        return;
    }

    let html = '<table class="evt-table"><thead><tr><th>날짜</th><th>시간</th><th>일정</th></tr></thead><tbody>';
    let lastDate = '';
    filtered.forEach(ev => {
        const [, mm, dd] = ev.date.split('-');
        const dow = ['일','월','화','수','목','금','토'][new Date(ev.date).getDay()];
        const showDate = ev.date !== lastDate;
        lastDate = ev.date;
        const timeStr = ev.allDay ? '종일' : `${ev.startTime}~${ev.endTime}`;
        html += `<tr><td>${showDate ? `<span class="evt-date-badge">${parseInt(mm)}/${parseInt(dd)} (${dow})</span>` : ''}</td><td class="evt-time">${timeStr}</td><td>${ev.summary}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('calEventList').innerHTML = html;
}
</script>
