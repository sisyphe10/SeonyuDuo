<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선유듀오</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/korean-lunar-calendar@0.3.6/dist/korean-lunar-calendar.min.js"></script>
    <style>
        :root {
            --bg: #F0EDEA;
            --card: #ffffff;
            --accent: #FF5252;
            --accent-light: #FFB0B0;
            --text: #222222;
            --text-light: #999999;
            --border: #F0F0F0;
            --green: #5a9e6f;
            --red: #FF5252;
            --blue: #5B7FFF;
            --peach: #FFF0EE;
            /* domino-style asset palette */
            --dm-bg: #F0EDEA;
            --dm-card: #ffffff;
            --dm-text: #222222;
            --dm-text2: #999999;
            --dm-divider: #F0F0F0;
            --dm-indigo: #3D3A6E;
            --dm-blue: #5B7FFF;
            --dm-soft: #8FA8FF;
            --dm-peri: #C0CCFF;
            --dm-light: #D8DFFF;
            --dm-pale: #E8ECFF;
            --dm-coral: #FF5252;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Password Overlay ── */
        .pw-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #F5F3F0 0%, #EDEAE6 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .pw-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 360px;
            width: 90%;
        }
        .pw-box h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--accent);
        }
        .pw-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .pw-box input:focus { border-color: var(--accent); }
        .pw-box button {
            margin-top: 12px;
            padding: 10px 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .pw-box button:hover { background: #E84545; }
        .pw-error {
            color: var(--red);
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
        .pw-hidden { display: none; }

        /* ── Header ── */
        header {
            background: #fff;
            padding: 24px;
            text-align: center;
            color: var(--text);
            position: relative;
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #222;
        }
        header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        header a:hover { opacity: 0.7; }

        /* ── Tab Navigation ── */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 0;
            background: #fff;
            border-bottom: 1px solid #EEEEEE;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab-btn {
            padding: 14px 24px;
            border: none;
            background: none;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* ── Content ── */
        .content { padding: 24px; max-width: 1000px; margin: 0 auto; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: none;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Tables ── */
        .memo-tip-text {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: #fff;
            font-size: 0.78rem;
            padding: 8px 12px;
            border-radius: 8px;
            white-space: normal;
            width: max-content;
            max-width: 220px;
            z-index: 10;
            line-height: 1.4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .memo-tip:hover .memo-tip-text,
        .memo-tip.show-tip .memo-tip-text { display: block; }
        .goal-card {
            flex: 1;
            min-width: 260px;
            background: var(--dm-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .goal-card .goal-owner {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--dm-text);
            margin-bottom: 14px;
        }
        .goal-card .goal-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--dm-text2);
            margin-bottom: 6px;
            margin-top: 12px;
        }
        .goal-card .goal-section-title:first-of-type { margin-top: 0; }
        .goal-card .goal-item {
            font-size: 0.82rem;
            color: var(--dm-text);
            padding: 6px 0;
            border-bottom: 1px solid var(--dm-divider);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .goal-card .goal-item:last-child { border-bottom: none; }
        .goal-badge {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .goal-badge.duo { background: #222; color: #fff; }
        .goal-badge.ts { background: var(--dm-coral); color: #fff; }
        .goal-badge.ny { background: var(--dm-blue); color: #fff; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .data-table th {
            padding: 10px 12px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            color: #CC4040;
            border-bottom: 2px solid #FFD6D6;
            background: #FFF0EE;
            white-space: nowrap;
        }
        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .data-table tbody tr:hover td { background: #FAFAFA; }
        .data-table .num { text-align: right; }
        .data-table .center { text-align: center; }
        .positive { color: var(--red); }
        .negative { color: var(--blue); }

        /* ── Balance Sheet (Domino style) ── */
        .bs-net {
            text-align: center;
            background: var(--dm-card);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .bs-net .label { font-size: 0.78rem; color: #222; margin-bottom: 6px; font-weight: 700; }
        .bs-net .value { font-size: 1.6rem; font-weight: 800; color: var(--dm-text); }
        .bs-wrap {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .bs-side {
            flex: 1;
            background: var(--dm-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: none;
        }
        .bs-side.asset { border-left: none; }
        .bs-side.debt  { border-left: none; }
        .bs-title {
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 8px;
        }
        .bs-side.asset .bs-title { background: var(--dm-coral); color: #fff; }
        .bs-side.debt  .bs-title { background: var(--dm-blue); color: #fff; }
        .bs-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.88rem;
        }
        .bs-row .label { color: var(--dm-text); }
        .bs-row .amt { font-weight: 600; color: var(--dm-text); }
        .bs-total {
            display: flex;
            justify-content: space-between;
            padding: 10px 0 0;
            margin-top: 8px;
            border-top: 1px solid var(--dm-divider);
            font-weight: 700;
            font-size: 1rem;
        }
        .bs-side.asset .bs-total { color: #222; }
        .bs-side.debt  .bs-total { color: #222; }

        .bs-group {
            border: 1.5px solid #222;
            border-radius: 12px;
            padding: 12px 14px 8px;
            margin-bottom: 10px;
        }
        .bs-group:last-of-type { margin-bottom: 0; }
        .bs-group-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .bs-wrap { flex-direction: column; }
        }


        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-light);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-state .msg { font-size: 0.95rem; }
        .empty-state .hint {
            font-size: 0.82rem;
            margin-top: 8px;
            color: #b0a89e;
        }

        /* ── Loading ── */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #EEEEEE;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Config Banner ── */
        .config-banner {
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #e65100;
            line-height: 1.6;
        }
        .config-banner code {
            background: #fff;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.82rem;
        }

        /* ── Calendar ── */
        .cal-month-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .cal-month-nav button {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: #fff;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
        }
        .cal-month-nav button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .cal-month-label { font-size: 1.05rem; font-weight: 700; min-width: 110px; text-align: center; }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 20px;
        }
        .cal-dow {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-light);
            padding: 6px 0;
        }
        .cal-dow.sun { color: var(--red); }
        .cal-dow.sat { color: var(--blue); }
        .cal-cell {
            background: #fff;
            border-radius: 8px;
            padding: 5px;
            min-height: 72px;
            border: 1px solid var(--border);
            cursor: default;
            overflow-y: auto;
        }
        .cal-cell.empty { background: transparent; border: none; }
        .cal-cell.today { border-color: var(--accent); border-width: 2px; }
        .cal-cell.sun .cal-d { color: var(--red); }
        .cal-cell.sat .cal-d { color: var(--blue); }
        .cal-d { font-size: 0.72rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
        .cal-ev {
            font-size: 0.6rem;
            line-height: 1.35;
            padding: 1px 4px;
            border-radius: 3px;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: var(--peach);
            color: #555;
            font-weight: 600;
        }
        .cal-ev.birthday {
            background: #FFF0F5;
            color: #555;
        }

        /* Year Calendar */
        .year-cal-section {
            margin-bottom: 16px;
            background: #fff;
            border-radius: 14px;
            padding: 18px;
        }
        .year-cal-header {
            text-align: center;
            margin-bottom: 14px;
        }
        .year-cal-header h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent);
        }
        .year-cal-header .sub {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 2px;
        }
        .year-cal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .month-card {
            background: transparent;
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #bbb;
        }
        .month-card-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }
        .month-card-events {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .month-evt {
            font-size: 0.8rem;
            color: var(--text);
            padding: 4px 8px;
            border-radius: 6px;
            background: transparent;
            cursor: default;
            position: relative;
        }
        .month-evt:hover {
            background: #f0f0f0;
        }
        .month-evt .tooltip {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            z-index: 10;
            margin-bottom: 4px;
        }
        .month-evt:hover .tooltip { display: block; }
        .month-card-empty {
            font-size: 0.75rem;
            color: var(--text-light);
            padding: 4px 0;
        }

        /* D-Day Section */
        .dday-section {
            margin-bottom: 16px;
            background: #fff;
            border-radius: 14px;
            padding: 18px;
        }
        .dday-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .dday-row {
            background: #F7F5F2;
            border-radius: 10px;
            padding: 14px 14px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dday-row.soon { background: #FFF0EE; }
        .dday-row.today { border-color: var(--accent); border-width: 2px; background: #FFE0DB; }
        .dday-date-col {
            min-width: 40px;
            text-align: center;
        }
        .dday-date-day { font-size: 1rem; font-weight: 800; color: var(--text); }
        .dday-date-dow { font-size: 0.65rem; color: var(--text-light); }
        .dday-info { flex: 1; min-width: 0; }
        .dday-name { font-size: 0.85rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dday-badge {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-light);
            white-space: nowrap;
        }
        .dday-row.today .dday-badge { color: var(--accent); }

        .evt-table { width: 100%; border-collapse: collapse; }
        .evt-table th {
            background: #FAFAFA;
            padding: 10px 12px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-light);
            border-bottom: 2px solid var(--border);
        }
        .evt-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .evt-table tr:hover td { background: #FAFAFA; }
        .evt-table tr.past td { color: #ccc; }
        .evt-table tr.past .evt-date-badge { background: #f5f5f5; color: #bbb; }
        .evt-table tr.past .evt-time { color: #ccc; }
        .evt-month-group { margin-bottom: 16px; }
        .evt-month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #FAFAFA;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text);
            transition: background 0.2s;
            user-select: none;
        }
        .evt-month-header:hover { background: #f0f0f0; }
        .evt-month-header .evt-arrow { font-size: 0.75rem; color: var(--text-light); transition: transform 0.2s; }
        .evt-month-header .evt-arrow.open { transform: rotate(180deg); }
        .evt-month-header .evt-count { font-size: 0.75rem; color: var(--text-light); font-weight: 500; }
        .evt-month-body { display: none; margin-top: 4px; }
        .evt-month-body.open { display: block; }
        .evt-date-badge {
            display: inline-block;
            background: var(--peach);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.78rem;
            padding: 2px 8px;
            border-radius: 6px;
        }
        .evt-time { color: var(--text-light); font-size: 0.8rem; }
        .evt-empty { text-align: center; padding: 40px; color: var(--text-light); }

        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .tab-btn { padding: 12px 14px; font-size: 0.85rem; }
            .content { padding: 16px; }
        }
    </style>
</head>
<body>

<!-- Password Overlay -->
<div id="pwOverlay" class="pw-overlay">
    <div class="pw-box">
        <h2>선유듀오</h2>
        <p style="color:#8a7e76;margin-bottom:20px;font-size:0.9rem">비밀번호를 입력하세요</p>
        <input type="password" id="pwInput" placeholder="비밀번호" autofocus
               onkeydown="if(event.key==='Enter')checkPw()">
        <button onclick="checkPw()">확인</button>
        <div id="pwError" class="pw-error">비밀번호가 틀렸습니다.</div>
    </div>
</div>

<!-- Main Content -->
<div id="mainContent" class="pw-hidden">

<header>
    <h1>선유듀오</h1>
    <div style="position:absolute;top:14px;right:20px;display:flex;gap:8px;align-items:center">
        <a href="https://www.youtube.com/playlist?list=PLqmCTHxdkjRPoKzLBVgeSm3t8oyB-aE_G" target="_blank" style="padding:5px 12px;border:1.5px solid #ccc;border-radius:6px;text-decoration:none;color:#333;font-size:0.8rem;font-weight:600;">Youtube</a>
        <a href="https://docs.google.com/spreadsheets/d/1w6q3UwUER7oINuk50LyMzgF2K0Fbt2wgSVJ34vImo0g/edit" target="_blank" style="padding:5px 12px;border:1.5px solid #ccc;border-radius:6px;text-decoration:none;color:#333;font-size:0.8rem;font-weight:600;">Sheet</a>
    </div>
</header>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('assets')">자산관리</button>
    <button class="tab-btn" onclick="switchTab('calendar')">캘린더</button>
    <button class="tab-btn" onclick="switchTab('ledger')">가계부</button>
    <button class="tab-btn" onclick="switchTab('exercise')">운동</button>
    <button class="tab-btn" onclick="switchTab('meeting')">가족회의</button>
</div>

<div class="content">

    <!-- ====== 자산관리 ====== -->
    <div id="tab-assets" class="tab-content active">
        <div id="assets-summary"></div>
        <div id="assets-charts" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
            <div style="flex:1;min-width:280px;display:flex;flex-direction:column;gap:12px">
                <div style="background:var(--dm-card);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                    <div style="font-size:0.82rem;font-weight:700;color:var(--dm-text);margin-bottom:12px">순자산 추이</div>
                    <canvas id="chartLine"></canvas>
                </div>
                <div style="background:var(--dm-card);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                    <div style="font-size:0.82rem;font-weight:700;color:var(--dm-text);margin-bottom:12px">월별 증감</div>
                    <canvas id="chartBar"></canvas>
                </div>
            </div>
            <div style="flex:1;min-width:280px;background:var(--dm-card);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                    <div style="display:flex;align-items:center;gap:8px">

async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPw() {
    const hash = await sha256(document.getElementById('pwInput').value);
    if (hash === PW_HASH) {
        document.getElementById('pwOverlay').style.display = 'none';

        document.getElementById('pwError').style.display = 'block';

        document.getElementById('pwInput').focus();
    }
}

// ── Google Sheets Config ──
// 아래 SHEET_ID를 본인 Google Sheet ID로 교체하세요.
// Google Sheet → 파일 → 공유 → 웹에 게시 → 게시 후 사용
const SHEET_ID = '1w6q3UwUER7oINuk50LyMzgF2K0Fbt2wgSVJ34vImo0g';

const SHEET_NAMES = {
    assets: '자산관리',
    meeting: '가족회의',
    goals: '목표',
    exercise: '운동'
};

const GOOGLE_API_KEY = 'AIzaSyCHPiRby5FVAIKDwneZHy1KGl3SfycjZEw';

function sheetUrl(sheetName) {
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
}

function parseGviz(text) {
    // Google Visualization API returns "google.visualization.Query.setResponse({...})"
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\((.+)\)/s)[1]);
    const cols = json.table.cols.map(c => c.label);
    const rows = json.table.rows.map(r =>
        r.c.map(cell => {
            if (!cell) return '';
            return cell.v !== null ? cell.v : (cell.f || '');
        })
    );
    return { cols, rows };
}

async function fetchSheet(sheetName) {
    const resp = await fetch(sheetUrl(sheetName));
    const text = await resp.text();
    return parseGviz(text);
}

// ── Alignment Fetching (Sheets API v4) ──
async function fetchAlignments() {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?` +
        `ranges=${encodeURIComponent(SHEET_NAMES.assets)}` +
        `&ranges=${encodeURIComponent(SHEET_NAMES.meeting)}` +
        `&fields=sheets(properties.title,data.rowData.values.effectiveFormat.horizontalAlignment)` +
        `&key=${GOOGLE_API_KEY}`;
    const resp = await fetch(url);
    if (!resp.ok) return {};
    const json = await resp.json();
    const result = {};
    (json.sheets || []).forEach(sheet => {
        const title = sheet.properties.title;
        const rows = (sheet.data && sheet.data[0] && sheet.data[0].rowData) || [];
        // Use header row (1st row) alignment
        const refRow = rows[0];
        const aligns = (refRow?.values || []).map(v => {
            const a = v?.effectiveFormat?.horizontalAlignment;
            if (a === 'CENTER') return 'center';
            if (a === 'RIGHT') return 'right';
            return 'left';
        });
        if (title === SHEET_NAMES.assets) result.assets = aligns;
        else if (title === SHEET_NAMES.meeting) result.meeting = aligns;
    });
    return result;
}

// ── 셀 값 포맷 (컬럼명 기반 자동 판별) ──
function formatCell(val, colName) {
    const cn = (colName || '').trim();
    if (cn === '날짜') return formatDateStr(val);
    if (cn === '요일') return formatDayStr(val);
    if (cn === '금액') return formatMoney(val);
    if (cn === '결정사항') {
        const s = String(val ?? '').trim();
        if (!s) return '';
        const escaped = s.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        return `<span class="memo-tip" style="cursor:pointer;font-size:0.95rem;position:relative" onclick="this.classList.toggle('show-tip')">📄<span class="memo-tip-text">${s}</span></span>`;
    }
    if (cn.includes('완료')) {
        const v = String(val ?? '').toUpperCase().trim();
        const checked = (val === true || v === 'TRUE');
        return `<input type="checkbox"${checked ? ' checked' : ''} disabled style="pointer-events:none;width:16px;height:16px;accent-color:var(--dm-coral)">`;
    }
    return String(val ?? '');
}

// ── 동적 테이블 렌더링 (컬럼 자동 감지) ──
function renderSheet(cols, rows, aligns) {
    // 빈 컬럼 제거 (라벨이 비어있는 뒤쪽 컬럼)
    let colCount = cols.length;
    while (colCount > 0 && !cols[colCount - 1]) colCount--;
    const headers = cols.slice(0, colCount);

    // 메모 컬럼 인덱스 (오른쪽에 구분선)
    const memoIdx = headers.indexOf('메모');
    // 담당자 컬럼 인덱스 (담당자 변경 시 구분선)
    const ownerIdx = headers.indexOf('담당자');
    // 월별 금액 컬럼 판별 (메모 이후 컬럼)
    const isAmtCol = headers.map((h, i) => i > memoIdx && memoIdx !== -1 && h && h.includes('월'));

    const sorted = rows;
    let html = '<table class="data-table"><thead><tr>';
    headers.forEach((h, i) => {
        html += `<th style="text-align:${aligns[i] || 'center'}">${h}</th>`;
    });
    html += '</tr></thead><tbody>';
    let prevOwner = null;
    sorted.forEach(r => {
        const curOwner = ownerIdx !== -1 ? (r[ownerIdx] || '') : '';
        // 담당자 변경 시 구분선 행 삽입
        if (prevOwner !== null && curOwner && curOwner !== prevOwner) {
            html += `<tr><td colspan="${headers.length}" style="padding:0;border-bottom:2px solid #bbb;"></td></tr>`;
        }
        prevOwner = curOwner;
        html += '<tr>';
        headers.forEach((h, i) => {
            const ws = ['내용','결정사항','메모'].includes(h) ? 'white-space:normal;max-width:250px;' : '';
            const bodyAlign = (h === '내용') ? 'left' : (aligns[i] || 'center');
            const bg = isAmtCol[i] ? 'background:#f8f8f8;' : '';
            // 월별 금액 컬럼이면 콤마 포맷
            const cellVal = isAmtCol[i] ? formatMoney(r[i]) : formatCell(r[i], h);
            html += `<td style="${ws}text-align:${bodyAlign};${bg}">${cellVal}</td>`;
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
}

const PIE_COLORS = ['#222222','#FF5252','#FF8C42','#CC4040','#FFB0B0','#FF6B6B','#333333','#E86450','#FFA07A','#D4453A'];

function renderBarChart(monthlyData, labels) {
    const ctx = document.getElementById('chartBar');
    if (!ctx) return;
    if (barChartInstance) barChartInstance.destroy();
    const months = labels || ['2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    // 월별 증감 계산: 2월은 그대로(첫달), 3월부터는 전월 대비 차이
    const changes = monthlyData.map((val, i) => {
        if (val === null) return null;
        if (i === 0) return val; // 2월: 전체 금액
        // 이전 달 중 가장 최근 값 찾기

    });
    const colors = changes.map(v => v === null ? 'transparent' : v >= 0 ? '#FF5252' : '#5B7FFF');

        type: 'bar',
        plugins: [ChartDataLabels],
        data: {
            labels: months,

                label: '월별 증감',

                borderRadius: 4,
                barPercentage: 0.6

        options: {
            responsive: true,
            plugins: {
                datalabels: {
                    display: ctx => ctx.dataset.data[ctx.dataIndex] !== null,

                        callback: v => {
                            if (Math.abs(v) >= 100000000) return (v/100000000).toFixed(1) + '억';

function renderPieChart(allAssets) {
    const ctx = document.getElementById('chartPie');
    if (!ctx || allAssets.length === 0) return;
    if (pieChartInstance) pieChartInstance.destroy();

    // 자산명 기준 그룹핑
    const grouped = {};
    allAssets.forEach(x => {
        const key = x.name || x.display;
        if (!grouped[key]) grouped[key] = { name: key, amt: 0, details: [] };
        grouped[key].amt += x.amt;
        grouped[key].details.push(x.display);
    });
    const sorted = Object.values(grouped).sort((a, b) => b.amt - a.amt);
    const total = sorted.reduce((s, x) => s + x.amt, 0);
    const labels = sorted.map(x => x.name);
    const data = sorted.map(x => x.amt);
    const details = sorted.map(x => x.details);
    const colors = sorted.map((_, i) => PIE_COLORS[i % PIE_COLORS.length]);

    pieChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: colors,
                borderColor: '#fff',
                borderWidth: 2
            }]
        },
        plugins: [ChartDataLabels],
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        font: { size: 11 },
                        color: '#222',
                        padding: 12,
                        usePointStyle: true,
                        pointStyle: 'circle'
                    }
                },
                tooltip: {
                    callbacks: {
                        label: (tip) => {
                            const v = tip.parsed;
                            const pct = total > 0 ? ((v / total) * 100).toFixed(1) : 0;
                            const lines = [` ${tip.label}: ${v.toLocaleString()} (${pct}%)`];
                            const d = details[tip.dataIndex];
                            if (d && d.length > 0) d.forEach(x => lines.push(`  · ${x}`));
                            return lines;
                        }
                    }
                },
                datalabels: {
                    color: '#fff',
                    font: { size: 13, weight: 'bold' },
                    textAlign: 'center',
                    formatter: (v, ctx) => {
                        const pct = total > 0 ? ((v / total) * 100).toFixed(1) : 0;
                        if (pct < 5) return '';
                        const name = ctx.chart.data.labels[ctx.dataIndex];
                        return name + '\n' + pct + '%';
                    }
                }
            }
        }
    });
}

    dataRows.forEach(r => {
        const amt = Number(r[amtColIdx]) || 0;
        const type = r[typeI] || '';
        const name = r[nameI] || '';
        const memo = r[memoI] || '';
        const owner = r[ownerI] || '';
        const nameMemo = memo ? `${name} - ${memo}` : name;
        const display = owner ? `${owner} | ${nameMemo}` : nameMemo;
        if (type === '대출') debts.push({ display, nameMemo, amt, owner, name });
        else if (name.includes('비상장')) unlisted.push({ display, nameMemo, amt, owner, name });
        else listed.push({ display, nameMemo, amt, owner, name });
    });
    return { listed, unlisted, debts };
}

function calcNetWorth(classified) {
    const { listed, unlisted, debts } = classified;
    const totalListed = listed.reduce((s, x) => s + x.amt, 0);
    const totalUnlisted = unlisted.reduce((s, x) => s + x.amt, 0);
    const totalDebt = debts.reduce((s, x) => s + x.amt, 0);
    return { netWorth: totalListed - totalDebt, totalListed, totalUnlisted, totalAsset: totalListed + totalUnlisted, totalDebt };
}

// ── Excel serial date → {year, month} ──
function serialToYM(serial) {
    const d = new Date((serial - 25569) * 86400000);
    return { year: d.getFullYear(), month: d.getMonth() + 1 };
}

// ── 자산관리 (새 구조: 행=자산, 열=월별 금액) ──
async function loadAssets(aligns) {
    try {
        const { cols, rows } = await fetchSheet(SHEET_NAMES.assets);
        if (rows.length < 2) {
            document.getElementById('assets-table').innerHTML = emptyState('자산 데이터가 없습니다', '자산관리 시트에 데이터를 입력하세요');
            return;
        }

        // rows[0] = 헤더행: [담당자, 구분, 자산명, 메모, 46081(26.02), 46112(26.03), ...]
        const headerRow = rows[0];
        const dataRows = rows.slice(1);
        const META_COLS = 4; // 담당자, 구분, 자산명, 메모

        // 월별 컬럼 인덱스와 라벨 추출 (4번째 이후, 값이 있는 컬럼만)
        const monthCols = []; // [{idx, serial, year, month, label}]
        for (let i = META_COLS; i < headerRow.length; i++) {
            const v = headerRow[i];
            if (v && typeof v === 'number' && v > 40000) {
                const ym = serialToYM(v);
                monthCols.push({ idx: i, serial: v, year: ym.year, month: ym.month, label: `${ym.year % 100}년 ${ym.month}월` });
            }
        }
        if (monthCols.length === 0) {
            document.getElementById('assets-table').innerHTML = emptyState('월별 데이터가 없습니다', '시트에 날짜 컬럼을 추가하세요');
            return;
        }

        // 최신 월 기준 대차대조표
        const latestCol = monthCols[monthCols.length - 1];
        const latest = classifyRows(dataRows, headerRow, latestCol.idx);
        const { listed, unlisted, debts } = latest;
        latestDateStr = latestCol.label;

        // 순자산 추이 (월별)
        const lineLabels = monthCols.map(mc => `${mc.month}월`);
        const lineData = monthCols.map(mc => {
            const c = classifyRows(dataRows, headerRow, mc.idx);
            return calcNetWorth(c).netWorth;
        });

        const ownerSort = (a, b) => {
            if (a.owner !== b.owner) return a.owner === 'TS' ? -1 : 1;
            return b.amt - a.amt;
        };
        listed.sort(ownerSort);
        unlisted.sort(ownerSort);
        debts.sort(ownerSort);

        bsData = { listed, unlisted, debts };
        renderBalanceSheet(listed, unlisted, debts, 'all');
        const netDateEl = document.getElementById('netDateLabel');
        if (netDateEl) netDateEl.textContent = latestDateStr;

        // 차트 렌더링
        pieAllAssets = [...listed, ...unlisted];
        renderLineChart(lineData, lineLabels);
        renderBarChart(lineData, lineLabels);
        document.getElementById('pieOwnerFilter').value = 'all';
        renderPieChart(pieAllAssets);

        // 하단 테이블: 헤더 재구성
        const tableCols = ['담당자', '구분', '자산명', '메모', ...monthCols.map(mc => mc.label)];
        const tableRows = dataRows.map(r => {
            const meta = r.slice(0, META_COLS);
            const amts = monthCols.map(mc => r[mc.idx]);
            return [...meta, ...amts];
        });
        document.getElementById('assets-table').innerHTML = renderSheet(tableCols, tableRows, aligns);
    } catch (e) {
        console.error('loadAssets error:', e);
        document.getElementById('assets-table').innerHTML = errorState('자산 데이터를 불러올 수 없습니다: ' + e.message);
    }
}

            const owner = String(r[ownerIdx] || '').trim();

                    html += `<div class="goal-item"><span class="goal-badge ${owner.toLowerCase()}">${owner}</span><span>${g.goal}</span></div>`;

            });
            html += `</div>`;
            return html;
        }

        // 월간 목표 카드: 월별 → 담당자별
        function renderMonthlyCard(items) {
            if (items.length === 0) return '';
            // 월 순서 정렬
            const monthOrder = m => {
                const n = parseInt(m);
                return isNaN(n) ? 99 : n;
            };

        document.getElementById('goals-section').innerHTML = html;
    } catch (e) {

    }
}

// ── Utilities ──
function formatMoney(val) {
    const n = Number(val) || 0;
    return n.toLocaleString();
}

function parseDate(val) {
    if (!val) return null;
    if (typeof val === 'string' && val.startsWith('Date(')) {
        const parts = val.match(/Date\((\d+),(\d+),(\d+)\)/);
        if (parts) return new Date(+parts[1], +parts[2], +parts[3]);
    }
    const d = new Date(val);
    return isNaN(d) ? null : d;
}

function formatDateStr(val) {
    const d = parseDate(val);
    if (!d) return String(val || '');
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDayStr(val) {
    const days = ['일','월','화','수','목','금','토'];
    if (typeof val === 'string' && days.includes(val)) return val;
    const d = parseDate(val);
    if (d) return days[d.getDay()];
    return String(val || '');
}

function emptyState(msg, hint) {
    return `<div class="empty-state"><div class="icon">📭</div><div class="msg">${msg}</div><div class="hint">${hint || ''}</div></div>`;
}

function errorState(msg) {
    return `<div class="empty-state"><div class="icon">⚠️</div><div class="msg">${msg}</div><div class="hint">Google Sheets 연결 상태를 확인하세요</div></div>`;
}

// ── 캘린더 ──
const CAL_IDS = [
    'a49c912f9e11c6e050c873312ae00a314e45dc075540c86cf428c9921fcbc20c@group.calendar.google.com'
];

// 음력 생일 (음력 월/일)
const LUNAR_BIRTHDAYS = [
    { name: '혜자 생일', lunarMonth: 3, lunarDay: 4 },
    { name: '동석 생일', lunarMonth: 3, lunarDay: 12 },
    { name: '연순 생일', lunarMonth: 5, lunarDay: 3 },
    { name: '맹호 생일', lunarMonth: 8, lunarDay: 16 },
];
const LUNAR_HOLIDAYS = [
    { name: '설날', emoji: '🧧', lunarMonth: 1, lunarDay: 1 },
    { name: '추석', emoji: '🌕', lunarMonth: 8, lunarDay: 15 },
];
let calYear, calMonth, calEvents = [];

function initCalState() {
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    calYear = now.getFullYear();
    calMonth = now.getMonth() + 1;
}
initCalState();

function calPrevMonth() { calMonth--; if (calMonth < 1) { calMonth = 12; calYear--; } loadCalendar(); }
function calNextMonth() { calMonth++; if (calMonth > 12) { calMonth = 1; calYear++; } loadCalendar(); }

function getLunarEvents(year) {
    const cal = new KoreanLunarCalendar();
    const results = [];
    LUNAR_BIRTHDAYS.forEach(b => {
        try {
            if (cal.setLunarDate(year, b.lunarMonth, b.lunarDay, false)) {
                const s = cal.getSolarCalendar();
                const dateStr = `${s.year}-${String(s.month).padStart(2,'0')}-${String(s.day).padStart(2,'0')}`;
                results.push({ summary: `🎂 ${b.name} (음력 ${b.lunarMonth}/${b.lunarDay})`, date: dateStr, startTime: null, endTime: null, allDay: true, isBirthday: true });
            }
        } catch(e) {}
    });
    LUNAR_HOLIDAYS.forEach(h => {
        try {
            if (cal.setLunarDate(year, h.lunarMonth, h.lunarDay, false)) {
                const s = cal.getSolarCalendar();
                const dateStr = `${s.year}-${String(s.month).padStart(2,'0')}-${String(s.day).padStart(2,'0')}`;
                results.push({ summary: `${h.emoji} ${h.name}`, date: dateStr, startTime: null, endTime: null, allDay: true, isBirthday: true });
            }
        } catch(e) {}
    });
    return results;
}

let ddayEvents = [];

async function loadCalendar() {

    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    const fromCal = new Date(calYear, calMonth - 1, 1);
    const nextM = calMonth === 12 ? 1 : calMonth + 1;
    const nextY = calMonth === 12 ? calYear + 1 : calYear;
    const toCal = new Date(nextY, nextM, 0, 23, 59, 59);

    // D-Day: fetch 1 year from today
    const fromDday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const toDday = new Date(now.getFullYear() + 1, now.getMonth(), now.getDate());

    // Merge time ranges to avoid duplicate fetches
    const fetchFrom = new Date(Math.min(fromCal.getTime(), fromDday.getTime()));
    const fetchTo = new Date(Math.max(toCal.getTime(), toDday.getTime()));

    try {
        const fetches = CAL_IDS.map(async calId => {
            const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?key=${GOOGLE_API_KEY}&timeMin=${fetchFrom.toISOString()}&timeMax=${fetchTo.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=500`;
            const res = await fetch(url);
            if (!res.ok) return [];
            const data = await res.json();
            return (data.items || []);
        });
        const results = await Promise.all(fetches);
        const allApiEvents = results.flat().map(ev => {
            const allDay = !!ev.start.date;
            const start = allDay ? ev.start.date : ev.start.dateTime;
            const end = allDay ? ev.end.date : ev.end.dateTime;
            const raw = ev.summary || '(제목 없음)';
            return { summary: raw, date: start.slice(0, 10), startTime: allDay ? null : start.slice(11, 16), endTime: allDay ? null : end.slice(11, 16), allDay, isBirthday: false };
        });

        // Lunar birthdays for current + next year
        const birthdays = [...getLunarEvents(now.getFullYear()), ...getLunarEvents(now.getFullYear() + 1)];

        const allEvents = [...allApiEvents, ...birthdays].sort((a, b) => (a.date + (a.startTime || '')).localeCompare(b.date + (b.startTime || '')));

        // Deduplicate birthdays
        const seen = new Set();
        const deduped = allEvents.filter(ev => {
            if (ev.isBirthday) { const key = ev.date + ev.summary; if (seen.has(key)) return false; seen.add(key); }
            return true;
        });

        // Split: calEvents for grid (current+next month), ddayEvents for cards (1 year)
        const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        const oneYearStr = `${now.getFullYear()+1}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        calEvents = deduped.filter(ev => {
            const [ey, em] = ev.date.split('-').map(Number);
            return (ey === calYear && em === calMonth) || (ey === nextY && em === nextM);
        });
        ddayEvents = deduped.filter(ev => isDdayEvent(ev) && ev.date >= todayStr && ev.date <= oneYearStr);
    } catch (e) {
        calEvents = [];
        ddayEvents = [];
    }
    renderDdayCards();
    loadYearCalendar();
}

async function loadYearCalendar() {
    const DOW = ['일','월','화','수','목','금','토'];
    try {
        const url = sheetUrl('캘린더');
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
        const rows = json.table.rows;

        // 월별 이벤트 수집
        const monthEvents = {};
        for (let m = 1; m <= 12; m++) monthEvents[m] = [];

        rows.forEach(row => {
            const dateVal = row.c[0] ? row.c[0].v : null;
            const content = row.c[2] ? row.c[2].v : '';
            if (!dateVal || !content) return;

            const match = dateVal.match(/Date\((\d+),(\d+),(\d+)\)/);
            if (!match) return;

            const year = parseInt(match[1]);
            const month = parseInt(match[2]) + 1;  // gviz month is 0-indexed
            const day = parseInt(match[3]);
            const dow = DOW[new Date(year, month - 1, day).getDay()];

            monthEvents[month].push({
                day: day,
                dow: dow,
                month: month,
                content: content
            });
        });

        let html = '<div class="year-cal-header">';
        html += '<h2>2026년 <span style="font-size:0.85em;font-weight:600;color:var(--text);">병오년 🐴</span></h2>';
        html += '</div>';
        html += '<div class="year-cal-grid">';

        for (let m = 1; m <= 12; m++) {
            html += '<div class="month-card">';
            html += `<div class="month-card-title">${m}월</div>`;
            html += '<div class="month-card-events">';

            if (monthEvents[m].length === 0) {
                // empty month - leave blank
            } else {
                monthEvents[m].forEach(ev => {
                    html += `<div class="month-evt">• ${ev.content}<span class="tooltip">${ev.month}/${ev.day} (${ev.dow})</span></div>`;
                });
            }

            html += '</div></div>';
        }

        html += '</div>';
        document.getElementById('yearCalSection').innerHTML = html;
    } catch (e) {
        console.error('Year calendar load failed:', e);
    }
}

function isDdayPrefix(s) { return s.startsWith('D-day |') || s.startsWith('D-day|'); }
function stripDdayPrefix(s) { return s.startsWith('D-day |') ? s.slice(7).trim() : s.startsWith('D-day|') ? s.slice(6).trim() : s; }

function isDdayEvent(ev) {
    return ev.isBirthday || ev.summary.startsWith('D-day |') || ev.summary.startsWith('D-day|');
}

function cleanSummary(summary) {
    if (summary.startsWith('D-day |')) return summary.slice(7).trim();
    if (summary.startsWith('D-day|')) return summary.slice(6).trim();
    return summary;
}

const EMOJI_RULES = [
    [/결혼기념|웨딩|결혼식/, '💒'],
    [/생일|birthday/i, '🎂'],
    [/휴가|여행|vacation|trip|travel/i, '🏖️'],
    [/크리스마스|christmas/i, '🎄'],
    [/새해|신년|new year/i, '🎆'],
    [/추석/, '🌕'],
    [/설날|구정/, '🧧'],
    [/기념일|anniversary/i, '💝'],
    [/병원|진료|검진|치과/, '🏥'],
    [/회의|미팅|meeting/i, '📋'],
    [/공연|콘서트|concert|뮤지컬|연극/, '🎵'],
    [/영화|movie/i, '🎬'],
    [/운동|헬스|요가|필라테스/, '💪'],
    [/이사|입주/, '🏠'],
    [/졸업|입학/, '🎓'],
    [/시험|테스트|자격증/, '📝'],
    [/출장/, '✈️'],
    [/식사|저녁|점심|맛집|레스토랑/, '🍽️'],
    [/카페|커피/, '☕'],
    [/캠핑/, '⛺'],
    [/등산|산행|하이킹/, '⛰️'],
    [/수영/, '🏊'],
    [/골프/, '⛳'],
    [/스키|보드/, '🎿'],
    [/꽃|플라워/, '🌸'],
    [/선물/, '🎁'],
    [/파티|party/i, '🎉'],
];

function addEmoji(summary) {
    // Already has emoji at start
    if (/^\p{Emoji}/u.test(summary)) return summary;
    for (const [regex, emoji] of EMOJI_RULES) {
        if (regex.test(summary)) return emoji + ' ' + summary;
    }
    return '📌 ' + summary;
}

function renderDdayCards() {
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const todayMs = new Date(todayStr).getTime();

    if (ddayEvents.length === 0) { document.getElementById('ddaySection').innerHTML = ''; return; }

    // Deduplicate
    const seen = new Set();
    const unique = ddayEvents.filter(ev => {
        const key = ev.date + cleanSummary(ev.summary);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });
    // 가까운 날짜순 정렬
    unique.sort((a, b) => a.date.localeCompare(b.date));

    // 열 우선 배치: 위→아래, 좌→우 (3열)
    const cols = 3;
    const rows = Math.ceil(unique.length / cols);
    const reordered = [];
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const idx = c * rows + r;
            if (idx < unique.length) reordered.push(unique[idx]);
        }
    }

    let html = '<div class="dday-grid">';
    reordered.forEach(ev => {
        const evMs = new Date(ev.date).getTime();
        const diffDays = Math.round((evMs - todayMs) / 86400000);
        let badge;
        if (diffDays === 0) badge = 'D-Day';
        else if (diffDays > 0) badge = `D-${diffDays}`;
        else badge = `D+${Math.abs(diffDays)}`;

        const isToday = diffDays === 0;
        const isSoon = diffDays > 0 && diffDays <= 30;
        const [yy, mm, dd] = ev.date.split('-');
        const dow = ['일','월','화','수','목','금','토'][new Date(ev.date).getDay()];

        html += `<div class="dday-row${isToday ? ' today' : isSoon ? ' soon' : ''}">
            <div class="dday-date-col">
                <div class="dday-date-day">${parseInt(mm)}/${parseInt(dd)}</div>
                <div class="dday-date-dow">${dow}</div>
            </div>
            <div class="dday-info">
                <div class="dday-name">${ev.isBirthday ? cleanSummary(ev.summary) : addEmoji(cleanSummary(ev.summary))}</div>
                <div class="dday-badge">${badge}</div>
            </div>
        </div>`;
    });
    html += '</div>';

    document.getElementById('ddaySection').innerHTML = html;
}

function renderCalGrid() {
    const y = calYear, m = calMonth;
    const firstDay = new Date(y, m - 1, 1).getDay();
    const daysInMonth = new Date(y, m, 0).getDate();
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    const isThisMonth = now.getFullYear() === y && now.getMonth() + 1 === m;

    const dayNames = ['일','월','화','수','목','금','토'];
    let html = dayNames.map((d, i) => `<div class="cal-dow${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');

    const evByDay = {};
    calEvents.forEach(ev => {
        const [ey, em, ed] = ev.date.split('-').map(Number);
        if (ey === y && em === m) { if (!evByDay[ed]) evByDay[ed] = []; evByDay[ed].push(ev); }
    });

    for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
        const dow = (firstDay + d - 1) % 7;
        const isToday = isThisMonth && now.getDate() === d;
        let cls = 'cal-cell' + (dow===0?' sun':'') + (dow===6?' sat':'') + (isToday?' today':'');
        let evHtml = '';
        if (evByDay[d]) {
            const allDayEvs = evByDay[d].filter(e => e.allDay);
            const timedEvs = evByDay[d].filter(e => !e.allDay);
            allDayEvs.forEach(ev => { evHtml += `<div class="cal-ev${ev.isBirthday ? ' birthday' : ''}">${cleanSummary(ev.summary)}</div>`; });
            if (allDayEvs.length > 0 && timedEvs.length > 0) evHtml += '<div style="border-top:1px solid #e0e0e0;margin:2px 0"></div>';
            timedEvs.forEach(ev => { evHtml += `<div class="cal-ev">${ev.startTime} ${cleanSummary(ev.summary)}</div>`; });
        }
        html += `<div class="${cls}"><div class="cal-d">${d}</div>${evHtml}</div>`;
    }
    document.getElementById('calGrid').innerHTML = html;
}

// 가계부
// ═══════════════════════════════════════
let ledgerData = [];
let ledgerRefTypes = [];
let ledgerRefCategories = {};
let ledgerRefAccounts = [];
let ledgerYear, ledgerMonth;

function initLedger() {
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    ledgerYear = now.getFullYear();
    ledgerMonth = now.getMonth() + 1;
    document.getElementById('ldDate').value = `${ledgerYear}-${String(ledgerMonth).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}
initLedger();

function ledgerPrevMonth() { ledgerMonth--; if (ledgerMonth < 1) { ledgerMonth = 12; ledgerYear--; } renderLedger(); }
function ledgerNextMonth() { ledgerMonth++; if (ledgerMonth > 12) { ledgerMonth = 1; ledgerYear++; } renderLedger(); }

async function loadLedger() {
    try {
        const url = sheetUrl('가계부');
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
        const rows = json.table.rows;
        const cols = json.table.cols;

        ledgerData = [];
        ledgerRefTypes = [];
        ledgerRefCategories = {};
        ledgerRefAccounts = [];

        rows.forEach(row => {
            // A~F: 거래 데이터
            const dateVal = row.c[0] ? row.c[0].v : null;
            if (dateVal) {
                const match = dateVal.match(/Date\((\d+),(\d+),(\d+)\)/);
                if (match) {
                    const y = parseInt(match[1]);
                    const m = parseInt(match[2]) + 1;
                    const d = parseInt(match[3]);
                    ledgerData.push({
                        date: `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
                        type: row.c[1] ? row.c[1].v : '',
                        category: row.c[2] ? row.c[2].v : '',
                        amount: row.c[3] ? parseFloat(row.c[3].v) : 0,
                        memo: row.c[4] ? row.c[4].v : '',
                        account: row.c[5] ? row.c[5].v : '',
                    });
                }
            }

        });

        // 카테고리 시트에서 참조 데이터 로드
        const catUrl = sheetUrl('카테고리');
        const catRes = await fetch(catUrl);
        const catText = await catRes.text();
        const catJson = JSON.parse(catText.substring(catText.indexOf('{'), catText.lastIndexOf('}') + 1));
        catJson.table.rows.forEach(row => {
            const refType = row.c[0] ? row.c[0].v : '';
            const refCat = row.c[1] ? row.c[1].v : '';
            const refAcc = row.c[2] ? row.c[2].v : '';
            if (refType && refCat && refType !== '유형') {
                if (!ledgerRefCategories[refType]) ledgerRefCategories[refType] = [];
                if (!ledgerRefCategories[refType].includes(refCat)) ledgerRefCategories[refType].push(refCat);
                if (!ledgerRefTypes.includes(refType)) ledgerRefTypes.push(refType);
            }
            if (refAcc && refAcc !== '통장' && !ledgerRefAccounts.includes(refAcc)) ledgerRefAccounts.push(refAcc);
        });

        // 드롭다운 초기화
        const typeSelect = document.getElementById('ldType');
        typeSelect.innerHTML = ledgerRefTypes.map(t => `<option value="${t}">${t}</option>`).join('');
        updateLedgerCategories();

        const accSelect = document.getElementById('ldAccount');
        accSelect.innerHTML = ledgerRefAccounts.map(a => `<option value="${a}">${a}</option>`).join('');

        renderLedger();
    } catch (e) {
        console.error('Ledger load failed:', e);
    }
}

function updateLedgerCategories() {
    const type = document.getElementById('ldType').value;
    const catSelect = document.getElementById('ldCategory');
    const cats = ledgerRefCategories[type] || [];
    catSelect.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

function renderLedger() {
    document.getElementById('ledgerMonthLabel').textContent = `${ledgerYear}년 ${ledgerMonth}월`;

    const monthStr = `${ledgerYear}-${String(ledgerMonth).padStart(2,'0')}`;
    const monthData = ledgerData.filter(d => d.date.startsWith(monthStr));

    const income = monthData.filter(d => d.type === '수입').reduce((s, d) => s + d.amount, 0);
    const expense = monthData.filter(d => d.type === '지출').reduce((s, d) => s + d.amount, 0);
    const net = income - expense;

    function fmt(v) { return Math.abs(v).toLocaleString(); }

    document.getElementById('ledgerSummary').innerHTML = `
        <div style="background:#fff;border-radius:10px;padding:14px;border-left:4px solid var(--green);">
            <div style="font-size:0.75rem;color:var(--text-light);font-weight:600;">수입</div>
            <div style="font-size:1.1rem;font-weight:800;color:var(--green);">+${fmt(income)}</div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:14px;border-left:4px solid var(--red);">
            <div style="font-size:0.75rem;color:var(--text-light);font-weight:600;">지출</div>
            <div style="font-size:1.1rem;font-weight:800;color:var(--red);">-${fmt(expense)}</div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:14px;border-left:4px solid var(--blue);">
            <div style="font-size:0.75rem;color:var(--text-light);font-weight:600;">순수익</div>
            <div style="font-size:1.1rem;font-weight:800;color:${net >= 0 ? 'var(--green)' : 'var(--red)'};">${net >= 0 ? '+' : '-'}${fmt(net)}</div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:14px;border-left:4px solid var(--text-light);">
            <div style="font-size:0.75rem;color:var(--text-light);font-weight:600;">거래</div>
            <div style="font-size:1.1rem;font-weight:800;">${monthData.length}건</div>
        </div>
    `;

    // 테이블
    let html = '';
    monthData.sort((a, b) => b.date.localeCompare(a.date));
    monthData.forEach(d => {
        const color = d.type === '수입' ? 'var(--green)' : 'var(--red)';
        const sign = d.type === '수입' ? '+' : '-';
        html += `<tr style="border-bottom:1px solid var(--border);">
            <td style="padding:8px;text-align:center;">${d.date.slice(5)}</td>
            <td style="padding:8px;text-align:center;color:${color};font-weight:600;">${d.type}</td>
            <td style="padding:8px;text-align:center;">${d.category}</td>
            <td style="padding:8px;text-align:center;font-weight:600;color:${color};">${sign}${d.amount.toLocaleString()}</td>
            <td style="padding:8px;text-align:center;">${d.memo}</td>
            <td style="padding:8px;text-align:center;">${d.account}</td>
        </tr>`;
    });
    document.getElementById('ledgerTable').innerHTML = html || '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-light);">거래 내역이 없습니다</td></tr>';
}

async function addLedgerEntry() {
    const date = document.getElementById('ldDate').value;
    const type = document.getElementById('ldType').value;
    const category = document.getElementById('ldCategory').value;
    const amount = document.getElementById('ldAmount').value;
    const memo = document.getElementById('ldMemo').value;
    const account = document.getElementById('ldAccount').value;

    if (!date || !amount) { alert('날짜와 금액을 입력하세요.'); return; }

    try {
        const appendUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/가계부!A:F:append?valueInputOption=USER_ENTERED&key=${GOOGLE_API_KEY}`;
        const res = await fetch(appendUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ values: [[date, type, category, parseFloat(amount), memo, account]] })
        });
        if (res.ok) {
            document.getElementById('ldAmount').value = '';
            document.getElementById('ldMemo').value = '';
            await loadLedger();
        } else {
            const err = await res.text();
            alert('저장 실패: ' + err);
        }
    } catch (e) {
        alert('저장 실패: ' + e.message);
    }
}
