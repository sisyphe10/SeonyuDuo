<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선유듀오</title>
    <style>
        :root {
            --bg: #fff2eb;
            --card: #ffffff;
            --accent: #e8967a;
            --accent-light: #ffdcdc;
            --text: #5a4a42;
            --text-light: #8a7e76;
            --border: #ffd6ba;
            --green: #5a9e6f;
            --red: #c75c5c;
            --blue: #5b7fb5;
            --peach: #ffe8cd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Password Overlay ── */
        .pw-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #fff2eb 0%, #ffe8cd 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .pw-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 360px;
            width: 90%;
        }
        .pw-box h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--accent);
        }
        .pw-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .pw-box input:focus { border-color: var(--accent); }
        .pw-box button {
            margin-top: 12px;
            padding: 10px 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .pw-box button:hover { background: #d4856b; }
        .pw-error {
            color: var(--red);
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
        .pw-hidden { display: none; }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #ffdcdc 0%, #ffd6ba 100%);
            padding: 24px;
            text-align: center;
            color: var(--text);
            position: relative;
        }
        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
        header .subtitle {
            font-size: 0.9rem;
            opacity: 0.75;
            margin-top: 4px;
        }
        header a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        header a:hover { opacity: 0.65; }

        /* ── Tab Navigation ── */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 0;
            background: #fff;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab-btn {
            padding: 14px 24px;
            border: none;
            background: none;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* ── Content ── */
        .content { padding: 24px; max-width: 1000px; margin: 0 auto; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Tables ── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .data-table th {
            padding: 10px 12px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 2px solid var(--border);
            background: var(--peach);
            white-space: nowrap;
        }
        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #ffe8cd;
            white-space: nowrap;
        }
        .data-table tbody tr:hover td { background: #fff2eb; }
        .data-table .num { text-align: right; }
        .data-table .center { text-align: center; }
        .positive { color: var(--red); }
        .negative { color: var(--blue); }

        /* ── Summary Cards ── */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .summary-card {
            background: var(--card);
            border-radius: 10px;
            padding: 18px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .summary-label {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .summary-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-light);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-state .msg { font-size: 0.95rem; }
        .empty-state .hint {
            font-size: 0.82rem;
            margin-top: 8px;
            color: #b0a89e;
        }

        /* ── Loading ── */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Config Banner ── */
        .config-banner {
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #e65100;
            line-height: 1.6;
        }
        .config-banner code {
            background: #fff;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.82rem;
        }

        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .tab-btn { padding: 12px 14px; font-size: 0.85rem; }
            .content { padding: 16px; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .photo-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- Password Overlay -->
<div id="pwOverlay" class="pw-overlay">
    <div class="pw-box">
        <h2>선유듀오</h2>
        <p style="color:#8a7e76;margin-bottom:20px;font-size:0.9rem">비밀번호를 입력하세요</p>
        <input type="password" id="pwInput" placeholder="비밀번호" autofocus
               onkeydown="if(event.key==='Enter')checkPw()">
        <button onclick="checkPw()">확인</button>
        <div id="pwError" class="pw-error">비밀번호가 틀렸습니다.</div>
    </div>
</div>

<!-- Main Content -->
<div id="mainContent" class="pw-hidden">

<header>
    <h1>선유듀오</h1>
    <div style="position:absolute;top:14px;right:20px;text-align:right">
        <a href="https://docs.google.com/spreadsheets/d/1w6q3UwUER7oINuk50LyMzgF2K0Fbt2wgSVJ34vImo0g/edit" target="_blank">스프레드시트 &#8599;</a>
        <div id="lastUpdated" style="font-size:0.7rem;color:rgba(90,74,66,0.45);margin-top:4px"></div>
    </div>
</header>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('assets')">자산관리</button>
    <button class="tab-btn" onclick="switchTab('meeting')">가족회의</button>
</div>

<div class="content">

    <!-- ====== 자산관리 ====== -->
    <div id="tab-assets" class="tab-content active">
        <div id="assets-summary" class="summary-grid"></div>
        <div class="card">
            <div class="card-title">자산 현황</div>
            <div id="assets-table"><div class="loading">데이터 로딩 중</div></div>
        </div>
    </div>

    <!-- ====== 가족회의 ====== -->
    <div id="tab-meeting" class="tab-content">
        <div class="card">
            <div class="card-title">가족회의 기록</div>
            <div id="meeting-table"><div class="loading">데이터 로딩 중</div></div>
        </div>
    </div>

</div>

<footer>
    선유듀오 &copy; 2026
</footer>

</div>

<script>
// ── Password ──
const PW_HASH = '7d78e91672fb21bfd70f2c3a5df40ee3d3cf052ae66a133df53822cc8bad44ee';

async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPw() {
    const hash = await sha256(document.getElementById('pwInput').value);
    if (hash === PW_HASH) {
        document.getElementById('pwOverlay').style.display = 'none';
        document.getElementById('mainContent').classList.remove('pw-hidden');
        sessionStorage.setItem('seonyu_auth', '1');
        loadAllData();
    } else {
        document.getElementById('pwError').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
    }
}

if (sessionStorage.getItem('seonyu_auth') === '1') {
    document.getElementById('pwOverlay').style.display = 'none';
    document.getElementById('mainContent').classList.remove('pw-hidden');
    window.addEventListener('DOMContentLoaded', loadAllData);
}

// ── Tab Switching ──
function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
}

// ── Google Sheets Config ──
// 아래 SHEET_ID를 본인 Google Sheet ID로 교체하세요.
// Google Sheet → 파일 → 공유 → 웹에 게시 → 게시 후 사용
const SHEET_ID = '1w6q3UwUER7oINuk50LyMzgF2K0Fbt2wgSVJ34vImo0g';

const SHEET_NAMES = {
    assets: '자산',
    meeting: '가족회의'
};

function sheetUrl(sheetName) {
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
}

function parseGviz(text) {
    // Google Visualization API returns "google.visualization.Query.setResponse({...})"
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\((.+)\)/s)[1]);
    const cols = json.table.cols.map(c => c.label);
    const rows = json.table.rows.map(r =>
        r.c.map(cell => cell ? (cell.v !== null ? cell.v : (cell.f || '')) : '')
    );
    return { cols, rows };
}

async function fetchSheet(sheetName) {
    const resp = await fetch(sheetUrl(sheetName));
    const text = await resp.text();
    return parseGviz(text);
}

// ── Data Loading ──
async function loadAllData() {
    if (!SHEET_ID) {
        showConfigBanner();
        return;
    }
    await Promise.all([loadAssets(), loadMeeting()]);
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} KST`;
    document.getElementById('lastUpdated').textContent = 'Updated: ' + ts;
}

function showConfigBanner() {
    const banner = `
        <div class="config-banner">
            Google Sheets 연동이 필요합니다:<br>
            1. Google Sheets에서 시트 2개 생성: <code>자산</code> <code>가족회의</code><br>
            2. 파일 &rarr; 공유 &rarr; 웹에 게시 &rarr; 전체 문서 게시<br>
            3. Sheet URL에서 ID 복사 (docs.google.com/spreadsheets/d/<b>여기</b>/edit)<br>
            4. index.html의 <code>SHEET_ID</code>에 붙여넣기
        </div>`;

    ['assets-table', 'meeting-table'].forEach(id => {
        document.getElementById(id).innerHTML = banner;
    });
    document.getElementById('budget-summary').innerHTML = '';
    document.getElementById('assets-summary').innerHTML = '';
}

// ── 자산관리 ──
// 시트 컬럼: 날짜(0) | 요일(1) | 구분(2) | 자산명(3) | 카테고리(4) | 금액(5) | 메모(6)
async function loadAssets() {
    try {
        const { cols, rows } = await fetchSheet(SHEET_NAMES.assets);
        if (rows.length === 0) {
            document.getElementById('assets-table').innerHTML = emptyState('자산 데이터가 없습니다', '자산 시트에 데이터를 입력하세요');
            return;
        }

        let totalAssets = 0;
        const catMap = {};
        rows.forEach(r => {
            const amt = Number(r[5]) || 0;
            totalAssets += amt;
            const cat = r[4] || '기타';
            catMap[cat] = (catMap[cat] || 0) + amt;
        });

        const cats = Object.entries(catMap).sort((a,b) => b[1]-a[1]);

        let summaryHtml = `
            <div class="summary-card">
                <div class="summary-label">총 자산</div>
                <div class="summary-value">${formatMoney(totalAssets)}</div>
            </div>`;
        cats.forEach(([cat, amt]) => {
            const pct = totalAssets > 0 ? ((amt / totalAssets) * 100).toFixed(1) : 0;
            summaryHtml += `
                <div class="summary-card">
                    <div class="summary-label">${cat}</div>
                    <div class="summary-value" style="font-size:1.1rem">${formatMoney(amt)}<br><span style="font-size:0.8rem;color:#8a7e76">${pct}%</span></div>
                </div>`;
        });
        document.getElementById('assets-summary').innerHTML = summaryHtml;

        const sorted = [...rows].reverse();
        let html = `<table class="data-table"><thead><tr>
            <th>날짜</th><th>요일</th><th>구분</th><th>자산명</th><th>카테고리</th><th class="num">금액</th><th>메모</th>
        </tr></thead><tbody>`;
        sorted.forEach(r => {
            html += `<tr>
                <td class="center">${formatDateStr(r[0])}</td>
                <td class="center">${r[1] || ''}</td>
                <td class="center">${r[2] || ''}</td>
                <td>${r[3] || ''}</td>
                <td>${r[4] || ''}</td>
                <td class="num">${formatMoney(r[5])}</td>
                <td>${r[6] || ''}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('assets-table').innerHTML = html;
    } catch (e) {
        document.getElementById('assets-table').innerHTML = errorState('자산 데이터를 불러올 수 없습니다');
    }
}

// ── 가족회의 ──
// 시트 컬럼: 날짜(0) | 요일(1) | 주제(2) | 내용(3) | 담당자(4) | 결정사항(5)
async function loadMeeting() {
    try {
        const { cols, rows } = await fetchSheet(SHEET_NAMES.meeting);
        if (rows.length === 0) {
            document.getElementById('meeting-table').innerHTML = emptyState('회의 기록이 없습니다', '가족회의 시트에 데이터를 입력하세요');
            return;
        }

        const sorted = [...rows].reverse();
        let html = `<table class="data-table"><thead><tr>
            <th>날짜</th><th>요일</th><th>주제</th><th>내용</th><th>담당자</th><th>결정사항</th>
        </tr></thead><tbody>`;
        sorted.forEach(r => {
            html += `<tr>
                <td class="center">${formatDateStr(r[0])}</td>
                <td class="center">${r[1] || ''}</td>
                <td><strong>${r[2] || ''}</strong></td>
                <td style="white-space:normal;max-width:250px">${r[3] || ''}</td>
                <td class="center">${r[4] || ''}</td>
                <td style="white-space:normal;max-width:200px">${r[5] || ''}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('meeting-table').innerHTML = html;
    } catch (e) {
        document.getElementById('meeting-table').innerHTML = errorState('가족회의 데이터를 불러올 수 없습니다');
    }
}

// ── Utilities ──
function formatMoney(val) {
    const n = Number(val) || 0;
    if (Math.abs(n) >= 100000000) {
        return (n / 100000000).toFixed(1) + '억';
    } else if (Math.abs(n) >= 10000) {
        return (n / 10000).toFixed(0) + '만원';
    }
    return n.toLocaleString() + '원';
}

function parseDate(val) {
    if (!val) return null;
    if (typeof val === 'string' && val.startsWith('Date(')) {
        const parts = val.match(/Date\((\d+),(\d+),(\d+)\)/);
        if (parts) return new Date(+parts[1], +parts[2], +parts[3]);
    }
    const d = new Date(val);
    return isNaN(d) ? null : d;
}

function formatDateStr(val) {
    const d = parseDate(val);
    if (!d) return String(val || '');
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function emptyState(msg, hint) {
    return `<div class="empty-state"><div class="icon">📭</div><div class="msg">${msg}</div><div class="hint">${hint || ''}</div></div>`;
}

function errorState(msg) {
    return `<div class="empty-state"><div class="icon">⚠️</div><div class="msg">${msg}</div><div class="hint">Google Sheets 연결 상태를 확인하세요</div></div>`;
}
</script>

</body>
</html>
