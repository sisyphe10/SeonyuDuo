<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선유듀오</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root {
            --bg: #F0EDEA;
            --card: #ffffff;
            --accent: #FF5252;
            --accent-light: #FFB0B0;
            --text: #222222;
            --text-light: #999999;
            --border: #F0F0F0;
            --green: #5a9e6f;
            --red: #FF5252;
            --blue: #5B7FFF;
            --peach: #FFF0EE;
            /* domino-style asset palette */
            --dm-bg: #F0EDEA;
            --dm-card: #ffffff;
            --dm-text: #222222;
            --dm-text2: #999999;
            --dm-divider: #F0F0F0;
            --dm-indigo: #3D3A6E;
            --dm-blue: #5B7FFF;
            --dm-soft: #8FA8FF;
            --dm-peri: #C0CCFF;
            --dm-light: #D8DFFF;
            --dm-pale: #E8ECFF;
            --dm-coral: #FF5252;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Password Overlay ── */
        .pw-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #F5F3F0 0%, #EDEAE6 100%);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .pw-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 360px;
            width: 90%;
        }
        .pw-box h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--accent);
        }
        .pw-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .pw-box input:focus { border-color: var(--accent); }
        .pw-box button {
            margin-top: 12px;
            padding: 10px 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .pw-box button:hover { background: #E84545; }
        .pw-error {
            color: var(--red);
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
        .pw-hidden { display: none; }

        /* ── Header ── */
        header {
            background: #fff;
            padding: 24px;
            text-align: center;
            color: var(--text);
            position: relative;
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #222;
        }
        header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        header a:hover { opacity: 0.7; }

        /* ── Tab Navigation ── */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 0;
            background: #fff;
            border-bottom: 1px solid #EEEEEE;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab-btn {
            padding: 14px 24px;
            border: none;
            background: none;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* ── Content ── */
        .content { padding: 24px; max-width: 1000px; margin: 0 auto; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: none;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Tables ── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .data-table th {
            padding: 10px 12px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            color: #CC4040;
            border-bottom: 2px solid #FFD6D6;
            background: #FFF0EE;
            white-space: nowrap;
        }
        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .data-table tbody tr:hover td { background: #FAFAFA; }
        .data-table .num { text-align: right; }
        .data-table .center { text-align: center; }
        .positive { color: var(--red); }
        .negative { color: var(--blue); }

        /* ── Balance Sheet (Domino style) ── */
        .bs-net {
            text-align: center;
            background: var(--dm-card);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .bs-net .label { font-size: 0.78rem; color: var(--dm-text2); margin-bottom: 6px; }
        .bs-net .value { font-size: 1.6rem; font-weight: 800; color: var(--dm-text); }
        .bs-wrap {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .bs-side {
            flex: 1;
            background: var(--dm-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: none;
        }
        .bs-side.asset { border-left: 3px solid var(--dm-coral); }
        .bs-side.debt  { border-left: 3px solid var(--dm-indigo); }
        .bs-title {
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--dm-divider);
        }
        .bs-side.asset .bs-title { color: var(--dm-coral); }
        .bs-side.debt  .bs-title { color: var(--dm-indigo); }
        .bs-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.88rem;
        }
        .bs-row .label { color: var(--dm-text); }
        .bs-row .amt { font-weight: 600; color: var(--dm-text); }
        .bs-total {
            display: flex;
            justify-content: space-between;
            padding: 10px 0 0;
            margin-top: 8px;
            border-top: 1px solid var(--dm-divider);
            font-weight: 700;
            font-size: 1rem;
        }
        .bs-side.asset .bs-total { color: var(--dm-coral); }
        .bs-side.debt  .bs-total { color: var(--dm-indigo); }

        .bs-group {
            border: 1px solid #E8E8E8;
            border-radius: 12px;
            padding: 12px 14px 8px;
            margin-bottom: 10px;
        }
        .bs-group:last-of-type { margin-bottom: 0; }
        .bs-group-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--dm-text2);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .bs-wrap { flex-direction: column; }
        }


        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-light);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-state .msg { font-size: 0.95rem; }
        .empty-state .hint {
            font-size: 0.82rem;
            margin-top: 8px;
            color: #b0a89e;
        }

        /* ── Loading ── */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #EEEEEE;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Config Banner ── */
        .config-banner {
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #e65100;
            line-height: 1.6;
        }
        .config-banner code {
            background: #fff;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.82rem;
        }

        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .tab-btn { padding: 12px 14px; font-size: 0.85rem; }
            .content { padding: 16px; }
        }
    </style>
</head>
<body>

<!-- Password Overlay -->
<div id="pwOverlay" class="pw-overlay">
    <div class="pw-box">
        <h2>선유듀오</h2>
        <p style="color:#8a7e76;margin-bottom:20px;font-size:0.9rem">비밀번호를 입력하세요</p>
        <input type="password" id="pwInput" placeholder="비밀번호" autofocus
               onkeydown="if(event.key==='Enter')checkPw()">
        <button onclick="checkPw()">확인</button>
        <div id="pwError" class="pw-error">비밀번호가 틀렸습니다.</div>
    </div>
</div>

<!-- Main Content -->
<div id="mainContent" class="pw-hidden">

<header>
    <h1>선유듀오</h1>
    <div style="position:absolute;top:14px;right:20px;text-align:right">
        <a href="https://docs.google.com/spreadsheets/d/1w6q3UwUER7oINuk50LyMzgF2K0Fbt2wgSVJ34vImo0g/edit" target="_blank">스프레드시트 &#8599;</a>
        <div id="lastUpdated" style="font-size:0.7rem;color:#999;margin-top:4px"></div>
    </div>
</header>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('assets')">자산관리</button>
    <button class="tab-btn" onclick="switchTab('meeting')">가족회의</button>
</div>

<div class="content">

    <!-- ====== 자산관리 ====== -->
    <div id="tab-assets" class="tab-content active">
        <div id="assets-charts" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
            <div style="flex:1;min-width:280px;background:var(--dm-card);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                <div style="font-size:0.82rem;font-weight:700;color:var(--dm-text);margin-bottom:12px">순자산 추이</div>
                <canvas id="chartLine"></canvas>
            </div>
            <div style="flex:1;min-width:280px;background:var(--dm-card);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                    <div style="display:flex;align-items:center;gap:8px">
                        <span style="font-size:0.82rem;font-weight:700;color:var(--dm-text)">자산 구성</span>
                        <select id="pieOwnerFilter" onchange="filterPieChart()" style="font-size:0.75rem;padding:2px 6px;border:1px solid #ddd;border-radius:6px;color:var(--dm-text);background:#fff;cursor:pointer">
                            <option value="all">듀오</option>
                            <option value="TS">TS</option>
                            <option value="NY">NY</option>
                        </select>
                    </div>
                    <span id="pieDate" style="font-size:0.75rem;color:var(--dm-text2)"></span>
                </div>
                <canvas id="chartPie"></canvas>
            </div>
        </div>
        <div id="assets-summary"></div>
        <div class="card">
            <div class="card-title">자산 현황</div>
            <div id="assets-table"><div class="loading">데이터 로딩 중</div></div>
        </div>
    </div>

    <!-- ====== 가족회의 ====== -->
    <div id="tab-meeting" class="tab-content">
        <div class="card">
            <div class="card-title">가족회의 기록</div>
            <div id="meeting-table"><div class="loading">데이터 로딩 중</div></div>
        </div>
    </div>

</div>

<footer>
    선유듀오 &copy; 2026
</footer>

</div>

<script>
// ── Password ──
const PW_HASH = '7d78e91672fb21bfd70f2c3a5df40ee3d3cf052ae66a133df53822cc8bad44ee';

async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPw() {
    const hash = await sha256(document.getElementById('pwInput').value);
    if (hash === PW_HASH) {
        document.getElementById('pwOverlay').style.display = 'none';
        document.getElementById('mainContent').classList.remove('pw-hidden');
        sessionStorage.setItem('seonyu_auth', '1');
        loadAllData();
    } else {
        document.getElementById('pwError').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
    }
}

if (sessionStorage.getItem('seonyu_auth') === '1') {
    document.getElementById('pwOverlay').style.display = 'none';
    document.getElementById('mainContent').classList.remove('pw-hidden');
    window.addEventListener('DOMContentLoaded', loadAllData);
}

// ── Tab Switching ──
function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
}

// ── Google Sheets Config ──
// 아래 SHEET_ID를 본인 Google Sheet ID로 교체하세요.
// Google Sheet → 파일 → 공유 → 웹에 게시 → 게시 후 사용
const SHEET_ID = '1w6q3UwUER7oINuk50LyMzgF2K0Fbt2wgSVJ34vImo0g';

const SHEET_NAMES = {
    assets: '자산관리',
    meeting: '가족회의'
};

const GOOGLE_API_KEY = 'AIzaSyCHPiRby5FVAIKDwneZHy1KGl3SfycjZEw';

function sheetUrl(sheetName) {
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
}

function parseGviz(text) {
    // Google Visualization API returns "google.visualization.Query.setResponse({...})"
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\((.+)\)/s)[1]);
    const cols = json.table.cols.map(c => c.label);
    const rows = json.table.rows.map(r =>
        r.c.map(cell => cell ? (cell.v !== null ? cell.v : (cell.f || '')) : '')
    );
    return { cols, rows };
}

async function fetchSheet(sheetName) {
    const resp = await fetch(sheetUrl(sheetName));
    const text = await resp.text();
    return parseGviz(text);
}

// ── Alignment Fetching (Sheets API v4) ──
async function fetchAlignments() {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?` +
        `ranges=${encodeURIComponent(SHEET_NAMES.assets)}` +
        `&ranges=${encodeURIComponent(SHEET_NAMES.meeting)}` +
        `&fields=sheets(properties.title,data.rowData.values.effectiveFormat.horizontalAlignment)` +
        `&key=${GOOGLE_API_KEY}`;
    const resp = await fetch(url);
    if (!resp.ok) return {};
    const json = await resp.json();
    const result = {};
    (json.sheets || []).forEach(sheet => {
        const title = sheet.properties.title;
        const rows = (sheet.data && sheet.data[0] && sheet.data[0].rowData) || [];
        // Use 2nd row (first data row) alignment; fallback to header row
        const refRow = rows.length > 1 ? rows[1] : rows[0];
        const aligns = (refRow?.values || []).map(v => {
            const a = v?.effectiveFormat?.horizontalAlignment;
            if (a === 'CENTER') return 'center';
            if (a === 'RIGHT') return 'right';
            return 'left';
        });
        if (title === SHEET_NAMES.assets) result.assets = aligns;
        else if (title === SHEET_NAMES.meeting) result.meeting = aligns;
    });
    return result;
}

// ── Data Loading ──
async function loadAllData() {
    if (!SHEET_ID) {
        showConfigBanner();
        return;
    }
    let alignments = {};
    try { alignments = await fetchAlignments(); } catch(e) {}
    await Promise.all([loadAssets(alignments.assets || []), loadMeeting(alignments.meeting || [])]);
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} KST`;
    document.getElementById('lastUpdated').textContent = 'Updated: ' + ts;
}

function showConfigBanner() {
    const banner = `
        <div class="config-banner">
            Google Sheets 연동이 필요합니다:<br>
            1. Google Sheets에서 시트 2개 생성: <code>자산</code> <code>가족회의</code><br>
            2. 파일 &rarr; 공유 &rarr; 웹에 게시 &rarr; 전체 문서 게시<br>
            3. Sheet URL에서 ID 복사 (docs.google.com/spreadsheets/d/<b>여기</b>/edit)<br>
            4. index.html의 <code>SHEET_ID</code>에 붙여넣기
        </div>`;

    ['assets-table', 'meeting-table'].forEach(id => {
        document.getElementById(id).innerHTML = banner;
    });
    document.getElementById('budget-summary').innerHTML = '';
    document.getElementById('assets-summary').innerHTML = '';
}

// ── 셀 값 포맷 (컬럼명 기반 자동 판별) ──
function formatCell(val, colName) {
    const cn = (colName || '').trim();
    if (cn === '날짜') return formatDateStr(val);
    if (cn === '요일') return formatDayStr(val);
    if (cn === '금액') return formatMoney(val);
    if (cn === '완료') {
        const checked = (val === true || val === 'TRUE');
        return `<input type="checkbox"${checked ? ' checked' : ''} disabled style="pointer-events:none;width:16px;height:16px;accent-color:var(--ch3)">`;
    }
    return String(val ?? '');
}

// ── 동적 테이블 렌더링 (컬럼 자동 감지) ──
function renderSheet(cols, rows, aligns) {
    // 빈 컬럼 제거 (라벨이 비어있는 뒤쪽 컬럼)
    let colCount = cols.length;
    while (colCount > 0 && !cols[colCount - 1]) colCount--;
    const headers = cols.slice(0, colCount);

    const sorted = rows;
    let html = '<table class="data-table"><thead><tr>';
    headers.forEach((h, i) => {
        html += `<th style="text-align:${aligns[i] || 'center'}">${h}</th>`;
    });
    html += '</tr></thead><tbody>';
    sorted.forEach(r => {
        html += '<tr>';
        headers.forEach((h, i) => {
            const ws = ['내용','결정사항','메모'].includes(h) ? 'white-space:normal;max-width:250px;' : '';
            html += `<td style="${ws}text-align:${aligns[i] || 'center'}">${formatCell(r[i], h)}</td>`;
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
}

// ── Charts ──
const PIE_COLORS = ['#222222','#FF5252','#FF8C42','#CC4040','#FFB0B0','#FF6B6B','#333333','#E86450','#FFA07A','#D4453A'];
let lineChartInstance = null;
let pieChartInstance = null;
let pieAllAssets = [];  // 파이차트용 전체 자산 데이터

function filterPieChart() {
    const filter = document.getElementById('pieOwnerFilter').value;
    const filtered = filter === 'all' ? pieAllAssets : pieAllAssets.filter(x => x.owner === filter);
    renderPieChart(filtered);
}

function renderLineChart(monthlyData) {
    const ctx = document.getElementById('chartLine');
    if (!ctx) return;
    if (lineChartInstance) lineChartInstance.destroy();
    const months = ['2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const data = monthlyData;
    lineChartInstance = new Chart(ctx, {
        type: 'line',
        plugins: [ChartDataLabels],
        data: {
            labels: months,
            datasets: [{
                label: '순자산',
                data: data,
                borderColor: '#FF5252',
                backgroundColor: 'rgba(255,82,82,0.08)',
                borderWidth: 2,
                pointBackgroundColor: '#FF5252',
                pointRadius: 5,
                tension: 0.3,
                fill: true,
                spanGaps: false
            }]
        },
        options: {
            responsive: true,
            plugins: {
                datalabels: { display: false },
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => ctx.parsed.y !== null ? ctx.parsed.y.toLocaleString() : ''
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: false,
                    ticks: {
                        callback: v => {
                            if (Math.abs(v) >= 100000000) return (v/100000000).toFixed(1) + '억';
                            if (Math.abs(v) >= 10000) return (v/10000).toFixed(0) + '만';
                            return v.toLocaleString();
                        },
                        font: { size: 11 },
                        color: '#999'
                    },
                    grid: { color: '#F0F0F0' }
                },
                x: {
                    ticks: { font: { size: 11 }, color: '#999' },
                    grid: { display: false }
                }
            }
        }
    });
}

function renderPieChart(allAssets) {
    const ctx = document.getElementById('chartPie');
    if (!ctx || allAssets.length === 0) return;
    if (pieChartInstance) pieChartInstance.destroy();

    // 자산명 기준 그룹핑
    const grouped = {};
    allAssets.forEach(x => {
        const key = x.name || x.display;
        if (!grouped[key]) grouped[key] = { name: key, amt: 0, details: [] };
        grouped[key].amt += x.amt;
        grouped[key].details.push(x.display);
    });
    const sorted = Object.values(grouped).sort((a, b) => b.amt - a.amt);
    const total = sorted.reduce((s, x) => s + x.amt, 0);
    const labels = sorted.map(x => x.name);
    const data = sorted.map(x => x.amt);
    const details = sorted.map(x => x.details);
    const colors = sorted.map((_, i) => PIE_COLORS[i % PIE_COLORS.length]);

    pieChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: colors,
                borderColor: '#fff',
                borderWidth: 2
            }]
        },
        plugins: [ChartDataLabels],
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        font: { size: 11 },
                        color: '#222',
                        padding: 12,
                        usePointStyle: true,
                        pointStyle: 'circle'
                    }
                },
                tooltip: {
                    callbacks: {
                        label: (tip) => {
                            const v = tip.parsed;
                            const pct = total > 0 ? ((v / total) * 100).toFixed(1) : 0;
                            const lines = [` ${tip.label}: ${v.toLocaleString()} (${pct}%)`];
                            const d = details[tip.dataIndex];
                            if (d && d.length > 0) d.forEach(x => lines.push(`  · ${x}`));
                            return lines;
                        }
                    }
                },
                datalabels: {
                    color: '#fff',
                    font: { size: 11, weight: 'bold' },
                    textAlign: 'center',
                    formatter: (v, ctx) => {
                        const pct = total > 0 ? ((v / total) * 100).toFixed(1) : 0;
                        if (pct < 5) return '';
                        const name = ctx.chart.data.labels[ctx.dataIndex];
                        return name + '\n' + pct + '%';
                    }
                }
            }
        }
    });
}

// ── 행을 자산/비상장/부채로 분류하는 헬퍼 ──
function classifyRows(rowSet, cols) {
    const amtIdx = cols.indexOf('금액');
    const typeIdx = cols.indexOf('구분');
    const nameIdx = cols.indexOf('자산명');
    const memoIdx = cols.indexOf('메모');
    const ownerIdx = cols.indexOf('담당자');
    const listed = [], unlisted = [], debts = [];
    rowSet.forEach(r => {
        const amt = Number(r[amtIdx]) || 0;
        const type = typeIdx !== -1 ? (r[typeIdx] || '') : '';
        const name = nameIdx !== -1 ? (r[nameIdx] || '') : '';
        const memo = memoIdx !== -1 ? (r[memoIdx] || '') : '';
        const owner = ownerIdx !== -1 ? (r[ownerIdx] || '') : '';
        const nameMemo = memo ? `${name} - ${memo}` : name;
        const display = owner ? `${owner} | ${nameMemo}` : nameMemo;
        if (type === '대출') debts.push({ display, nameMemo, amt, owner, name });
        else if (name.includes('비상장')) unlisted.push({ display, nameMemo, amt, owner, name });
        else listed.push({ display, nameMemo, amt, owner, name });
    });
    return { listed, unlisted, debts };
}

function calcNetWorth(classified) {
    const { listed, unlisted, debts } = classified;
    const totalListed = listed.reduce((s, x) => s + x.amt, 0);
    const totalUnlisted = unlisted.reduce((s, x) => s + x.amt, 0);
    const totalDebt = debts.reduce((s, x) => s + x.amt, 0);
    return { netWorth: totalListed - totalDebt, totalListed, totalUnlisted, totalAsset: totalListed + totalUnlisted, totalDebt };
}

// ── 자산관리 ──
async function loadAssets(aligns) {
    try {
        const { cols, rows } = await fetchSheet(SHEET_NAMES.assets);
        if (rows.length === 0) {
            document.getElementById('assets-table').innerHTML = emptyState('자산 데이터가 없습니다', '자산 시트에 데이터를 입력하세요');
            return;
        }

        const amtIdx = cols.indexOf('금액');
        if (amtIdx === -1) { document.getElementById('assets-table').innerHTML = renderSheet(cols, rows, aligns); return; }

        // 월별 그룹핑
        const dateIdx = cols.indexOf('날짜');
        const monthMap = {};  // 'YYYY-MM' → [rows]
        rows.forEach(r => {
            const d = parseDate(r[dateIdx]);
            const key = d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` : 'unknown';
            if (!monthMap[key]) monthMap[key] = [];
            monthMap[key].push(r);
        });
        const monthKeys = Object.keys(monthMap).filter(k => k !== 'unknown').sort();
        const latestMonth = monthKeys[monthKeys.length - 1];
        const latestRows = monthMap[latestMonth] || rows;

        // 최신 월 기준 데이터로 대차대조표/파이차트
        const latest = classifyRows(latestRows, cols);
        const { netWorth, totalListed, totalUnlisted, totalAsset, totalDebt } = calcNetWorth(latest);
        const { listed, unlisted, debts } = latest;

        // 순자산 추이 (월별)
        const lineData = new Array(11).fill(null);  // 2월~12월
        monthKeys.forEach(key => {
            const m = parseInt(key.split('-')[1]);
            if (m >= 2 && m <= 12) {
                const c = classifyRows(monthMap[key], cols);
                const nw = calcNetWorth(c);
                lineData[m - 2] = nw.netWorth;
            }
        });

        // 기준 월 표시
        const latestY = parseInt(latestMonth.split('-')[0]) % 100;
        const latestM = parseInt(latestMonth.split('-')[1]);
        document.getElementById('pieDate').textContent = `${latestY}년 ${latestM}월`;

        const ownerSort = (a, b) => {
            if (a.owner !== b.owner) return a.owner === 'TS' ? -1 : 1;
            return b.amt - a.amt;
        };
        listed.sort(ownerSort);
        unlisted.sort(ownerSort);
        debts.sort(ownerSort);

        // 소유자별 그룹 렌더링 헬퍼
        function renderOwnerGroups(items, unlistedItems) {
            const owners = [...new Set(items.map(x => x.owner).filter(Boolean))];
            if (owners.length === 0) owners.push('');
            let html = '';
            owners.forEach(ow => {
                const owItems = items.filter(x => x.owner === ow);
                const owUnlisted = (unlistedItems || []).filter(x => x.owner === ow);
                if (owItems.length === 0 && owUnlisted.length === 0) return;
                html += `<div class="bs-group">`;
                if (ow) html += `<div class="bs-group-title">${ow}</div>`;
                owItems.forEach(x => {
                    html += `<div class="bs-row"><span class="label">${x.nameMemo}</span><span class="amt">${formatMoney(x.amt)}</span></div>`;
                });
                if (owUnlisted.length > 0) {
                    html += `<div style="margin-top:6px;padding-top:6px;border-top:1px dashed #E8E8E8;font-size:0.72rem;color:var(--dm-text2);font-weight:600;margin-bottom:4px">비상장 투자</div>`;
                    owUnlisted.forEach(x => {
                        html += `<div class="bs-row" style="opacity:0.7"><span class="label">${x.nameMemo}</span><span class="amt">${formatMoney(x.amt)}</span></div>`;
                    });
                }
                html += `</div>`;
            });
            return html;
        }

        const leftRows = renderOwnerGroups(listed, unlisted);
        const rightRows = renderOwnerGroups(debts);

        const alphaHtml = totalUnlisted > 0 ? `<span style="font-size:0.85rem;color:var(--dm-text2);margin-left:10px">(+${formatMoney(totalUnlisted)})</span>` : '';
        const summaryHtml = `
            <div class="bs-net">
                <div class="label">순자산</div>
                <div class="value">${formatMoney(netWorth)}${alphaHtml}</div>
            </div>
            <div class="bs-wrap">
                <div class="bs-side asset">
                    <div class="bs-title">자산</div>
                    ${leftRows}
                    <div class="bs-total"><span>합계</span><span>${formatMoney(totalAsset)}</span></div>
                </div>
                <div class="bs-side debt">
                    <div class="bs-title">부채</div>
                    ${rightRows || '<div class="bs-row" style="color:var(--text-light)">없음</div>'}
                    <div class="bs-total"><span>합계</span><span>${formatMoney(totalDebt)}</span></div>
                </div>
            </div>`;
        document.getElementById('assets-summary').innerHTML = summaryHtml;

        // 차트 렌더링
        pieAllAssets = [...listed, ...unlisted];
        renderLineChart(lineData);
        document.getElementById('pieOwnerFilter').value = 'all';
        renderPieChart(pieAllAssets);

        document.getElementById('assets-table').innerHTML = renderSheet(cols, rows, aligns);
    } catch (e) {
        document.getElementById('assets-table').innerHTML = errorState('자산 데이터를 불러올 수 없습니다');
    }
}

// ── 가족회의 ──
async function loadMeeting(aligns) {
    try {
        const { cols, rows } = await fetchSheet(SHEET_NAMES.meeting);
        if (rows.length === 0) {
            document.getElementById('meeting-table').innerHTML = emptyState('회의 기록이 없습니다', '가족회의 시트에 데이터를 입력하세요');
            return;
        }
        document.getElementById('meeting-table').innerHTML = renderSheet(cols, rows, aligns);
    } catch (e) {
        document.getElementById('meeting-table').innerHTML = errorState('가족회의 데이터를 불러올 수 없습니다');
    }
}

// ── Utilities ──
function formatMoney(val) {
    const n = Number(val) || 0;
    return n.toLocaleString();
}

function parseDate(val) {
    if (!val) return null;
    if (typeof val === 'string' && val.startsWith('Date(')) {
        const parts = val.match(/Date\((\d+),(\d+),(\d+)\)/);
        if (parts) return new Date(+parts[1], +parts[2], +parts[3]);
    }
    const d = new Date(val);
    return isNaN(d) ? null : d;
}

function formatDateStr(val) {
    const d = parseDate(val);
    if (!d) return String(val || '');
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDayStr(val) {
    const days = ['일','월','화','수','목','금','토'];
    if (typeof val === 'string' && days.includes(val)) return val;
    const d = parseDate(val);
    if (d) return days[d.getDay()];
    return String(val || '');
}

function emptyState(msg, hint) {
    return `<div class="empty-state"><div class="icon">📭</div><div class="msg">${msg}</div><div class="hint">${hint || ''}</div></div>`;
}

function errorState(msg) {
    return `<div class="empty-state"><div class="icon">⚠️</div><div class="msg">${msg}</div><div class="hint">Google Sheets 연결 상태를 확인하세요</div></div>`;
}
